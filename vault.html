<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault — AI Infrastructure Explorer</title>

  <!-- ⚡ favicon: inline SVG data URI (no external request, works on file://) -->
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M13 2 4.5 13.5H11l-1 8.5L19.5 10H13z' fill='%233b82f6'/%3E%3C/svg%3E"
  />

  <!-- Shared editorial design tokens + components (masthead, chips, badges, .th-card, colophon). -->
  <link rel="stylesheet" href="shared/theme.css" />

  <style>
    /* vault.html-only layout. Tokens + components come from theme.css —
       nothing here redefines a token or an .aie-* / .th-card component. */

    .vault-shell { padding: 32px 0 8px; }

    /* ---- Index: header + filters ---- */
    .vlt-head { margin: 0 0 6px; }
    .vlt-title {
      font-family: var(--display); font-weight: 700;
      font-size: 22px; line-height: 1.1; letter-spacing: -0.02em;
      color: var(--ink); margin: 0 0 6px;
    }
    .vlt-viewtoggle { display: flex; gap: 6px; margin-top: 10px; }
    .vlt-viewtoggle .aie-chip { text-decoration: none; }
    .vlt-count {
      font-family: var(--mono); font-size: 12px; letter-spacing: .04em;
      color: var(--muted); margin: 0 0 22px;
    }
    .vlt-filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 22px; }
    .vlt-filters .aie-chip { cursor: pointer; }

    /* ---- Index: rows ---- */
    .vlt-rows { display: flex; flex-direction: column; }
    .vlt-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 6px; border-bottom: 1px solid var(--border);
      text-decoration: none; color: var(--text);
      transition: background var(--ease);
    }
    .vlt-row:hover { background: var(--paper-sink); }
    .vlt-row-title { font-family: var(--display); font-size: 16.5px; color: var(--ink); flex: 1 1 auto; min-width: 0; }
    .vlt-row-title .vlt-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: 8px; }
    .vlt-row-meta { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
    .vlt-updated { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 82px; text-align: right; }

    /* Stub / enriched status badges (warm-tinted, reuse the semantic palette). */
    .vlt-status {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 6px; line-height: 1;
    }
    .vlt-status--enriched { background: var(--sem-act-bg); color: var(--sem-act-fg); }
    .vlt-status--stub { background: var(--sem-pass-bg); color: var(--sem-pass-fg); }

    /* ---- Page view ---- */
    .vlt-article { max-width: 720px; }
    .vlt-eyebrow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 0 0 14px; }
    .vlt-back {
      font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
      color: var(--muted); text-decoration: none;
    }
    .vlt-back:hover { color: var(--ink); }
    .vlt-page-title {
      font-family: var(--display); font-weight: 700;
      font-size: 38px; line-height: 1.12; letter-spacing: -0.02em;
      color: var(--ink); margin: 0 0 18px;
    }

    /* Auto-stats strip — live from the ticker / theme record. */
    .vlt-stats {
      display: flex; flex-wrap: wrap; gap: 14px 30px;
      margin: 0 0 30px; padding: 16px 20px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-card); box-shadow: var(--shadow-sm);
    }
    .vlt-stat { display: flex; flex-direction: column; gap: 6px; }
    .vlt-stat-label {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    }
    .vlt-stat-value {
      font-family: var(--sans); font-size: 15px; font-weight: 600; color: var(--ink);
      display: flex; align-items: center; gap: 8px;
    }
    .vlt-stat-value .mono { font-family: var(--mono); font-weight: 600; }
    .vlt-chg { font-family: var(--mono); font-size: 12px; font-weight: 600; }
    .vlt-chg.up { color: #4d6a2b; }
    .vlt-chg.down { color: #a13d2f; }

    /* Note prose (serif 17/1.65 per house style). */
    .vlt-note { margin: 0 0 8px; }
    .vlt-p {
      font-family: var(--display); font-size: 17px; line-height: 1.65;
      color: var(--text); margin: 0 0 16px;
    }
    .vlt-p:last-child { margin-bottom: 0; }
    .vlt-p strong { font-weight: 700; color: var(--ink); }
    .vlt-note-empty {
      font-family: var(--sans); font-size: 14.5px; line-height: 1.6; color: var(--muted);
      margin: 0; padding: 16px 18px; background: var(--paper-sink);
      border-radius: 10px; border: 1px dashed var(--border);
    }
    .vlt-note-empty code {
      font-family: var(--mono); font-size: 12.5px;
      background: var(--card); padding: 1px 6px; border-radius: 4px;
    }

    /* Auto sections: memos / theses / backlinks. */
    .vlt-sec { margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); }
    .vlt-sec-title {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
      margin: 0 0 16px;
    }
    .vlt-sec-empty { font-family: var(--sans); font-size: 13.5px; color: var(--muted); margin: 0; }
    .vlt-sources { display: flex; flex-direction: column; gap: 12px; }

    /* Linked-memo list (mirrors memo.html's prior-memo rows). */
    .vlt-memos { list-style: none; margin: 0; padding: 0; }
    .vlt-memos a {
      display: flex; gap: 14px; align-items: baseline;
      padding: 12px 0; border-bottom: 1px solid var(--border);
      text-decoration: none; color: var(--text);
    }
    .vlt-memos a:hover .vm-title { color: var(--ink); }
    .vm-date { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 82px; flex: 0 0 auto; }
    .vm-title { font-family: var(--display); font-size: 15.5px; color: var(--ink); }
    .vm-kind { font-family: var(--mono); font-size: 10px; color: var(--muted); }

    /* Backlink / member chips. */
    .vlt-links { display: flex; flex-wrap: wrap; gap: 8px; }
    .vlt-linkchip {
      font-family: var(--mono); font-size: 12px;
      color: var(--text); text-decoration: none;
      padding: 5px 11px; border: 1px solid var(--border); border-radius: 999px;
      transition: border-color var(--ease), color var(--ease), background var(--ease);
    }
    .vlt-linkchip:hover { border-color: var(--muted); color: var(--ink); background: var(--paper-sink); }

    /* ---- Graph view (?view=graph) ----
       The canvas sits on the project's dark "blueprint" accent surface
       (same family as the map cross-section) so category colors glow
       against it. Node colors themselves come from data.js (themes) and
       theme.css tokens (everything else) at runtime — nothing hardcoded. */
    .vlt-graph-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; margin: 0 0 18px;
    }
    .vlt-graph-wrap {
      position: relative;
      height: clamp(460px, 66vh, 700px);
      background:
        radial-gradient(ellipse 80% 70% at 50% 38%, var(--stage-hi) 0%, var(--stage) 70%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--r-card);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .vlt-graph-wrap canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    .vlt-graph-wrap canvas.is-dragging { cursor: grabbing; }
    .vlt-graph-wrap canvas.is-hover { cursor: pointer; }

    /* Legend — one toggleable chip per node type, top-left overlay. */
    .vlt-glegend {
      position: absolute; top: 14px; left: 14px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .vlt-glegend button {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase;
      color: rgba(226, 232, 240, 0.85);
      background: rgba(22, 22, 26, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px; padding: 5px 12px 5px 8px;
      cursor: pointer; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: opacity var(--ease), border-color var(--ease);
    }
    .vlt-glegend button:hover { border-color: rgba(255, 255, 255, 0.35); }
    .vlt-glegend button.is-off { opacity: 0.35; }
    .vlt-glegend .dot {
      width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto;
      background: var(--dot, #ffffff);
    }

    /* Zoom controls — bottom-right overlay. */
    .vlt-gzoom {
      position: absolute; right: 14px; bottom: 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .vlt-gzoom button {
      width: 32px; height: 32px;
      font-family: var(--mono); font-size: 14px; line-height: 1;
      color: rgba(226, 232, 240, 0.9);
      background: rgba(22, 22, 26, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 9px; cursor: pointer;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: border-color var(--ease), background var(--ease);
    }
    .vlt-gzoom button:hover { border-color: rgba(255, 255, 255, 0.4); background: rgba(40, 40, 48, 0.7); }

    /* Detail side panel — white card floated over the event-stage graph. */
    .vlt-gpanel {
      position: absolute; top: 14px; right: 14px; width: 258px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow-lg);
      padding: 16px 16px 14px;
    }
    .vlt-gpanel[hidden] { display: none; }
    .vlt-gpanel-close {
      position: absolute; top: 8px; right: 10px;
      font-family: var(--mono); font-size: 13px; color: var(--muted);
      background: none; border: 0; cursor: pointer; padding: 4px;
    }
    .vlt-gpanel-close:hover { color: var(--ink); }
    .vlt-gpanel-title {
      font-family: var(--display); font-weight: 700; font-size: 17px;
      line-height: 1.25; letter-spacing: -0.01em; color: var(--ink); margin: 8px 0 10px;
    }
    .vlt-gpanel-stats { display: flex; flex-direction: column; gap: 7px; margin: 0 0 14px; }
    .vlt-gpanel-row { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
    .vlt-gpanel-row .k {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase; color: var(--muted);
    }
    .vlt-gpanel-row .v { font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--ink); text-align: right; }
    .vlt-gpanel-links { display: flex; flex-direction: column; gap: 6px; }
    .vlt-gpanel-links a {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; text-decoration: none;
      color: var(--text); padding: 8px 12px;
      border: 1px solid var(--border); border-radius: var(--r-chip); text-align: center;
      transition: border-color var(--ease), color var(--ease), background var(--ease);
    }
    .vlt-gpanel-links a:hover { border-color: var(--muted); color: var(--ink); background: var(--paper-sink); }
    .vlt-gpanel-links a.primary { background: var(--brand-grad); border-color: transparent; color: #fff; }

    .vlt-ghint {
      font-family: var(--mono); font-size: 11px; letter-spacing: .03em;
      color: var(--muted); margin: 12px 2px 0;
    }

    @media (max-width: 768px) {
      .vlt-graph-wrap { height: clamp(420px, 62vh, 560px); }
      /* Side panel becomes a bottom sheet. */
      .vlt-gpanel {
        top: auto; right: 10px; left: 10px; bottom: 10px; width: auto;
        border-radius: 14px;
      }
      .vlt-glegend { flex-direction: row; flex-wrap: wrap; max-width: 70%; }
      .vlt-ghint { display: none; }
    }

    /* ---- Empty state (shared shape with memo.html) ---- */
    .vlt-empty {
      max-width: 560px; margin: 64px auto; text-align: center;
      padding: 52px 34px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--r-card);
      box-shadow: var(--shadow-sm);
    }
    .vlt-empty h1 { font-family: var(--display); font-weight: 700; font-size: 28px; letter-spacing: -0.02em; color: var(--ink); margin: 0 0 12px; }
    .vlt-empty p { font-family: var(--sans); font-size: 15px; line-height: 1.6; color: var(--muted); margin: 0 0 22px; }
    .vlt-empty p code {
      font-family: var(--mono); font-size: 13px;
      background: var(--paper-sink); padding: 1px 6px; border-radius: 4px;
    }
    .vlt-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .vlt-actions a {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase; text-decoration: none;
      padding: 9px 16px; border-radius: var(--r-chip);
      border: 1px solid var(--border); color: var(--text);
      transition: border-color var(--ease), color var(--ease), background var(--ease);
    }
    .vlt-actions a:hover { border-color: var(--muted); color: var(--ink); background: var(--paper-sink); }
    .vlt-actions a.primary { background: var(--brand-grad); border-color: transparent; color: #fff; }

    @media (max-width: 768px) {
      .vlt-page-title { font-size: 30px; }
      .vlt-updated { min-width: 64px; }
      .vlt-row { gap: 10px; }
    }
  </style>
</head>
<body>
  <!-- 3px category-gradient border, painted at runtime by AIE.paintGradientBorder(). -->
  <div class="gradient-border" id="gradientBorder"></div>

  <!-- Shared top nav (theme.css). Rendered by AIE.renderNav(...) at boot. -->
  <div id="topNav"></div>

  <main class="aie-wrap vault-shell" id="vaultMain"><!-- filled by boot() --></main>

  <footer class="aie-colophon" id="colophon"><!-- disclaimer from the store at boot --></footer>

  <!-- data.js MUST load first: defines window.AIE_DATA -->
  <script src="data.js"></script>
  <!-- Shared AIE namespace (seeding, nav, formatters, wikilink parser). After data.js. -->
  <script src="shared/common.js"></script>

  <script>
    (function () {
      "use strict";
      var DATA = window.AIE_DATA || {};
      var AIE = window.AIE;

      // Shared boot: seed localStorage, paint the category gradient.
      AIE.seed();
      AIE.paintGradientBorder();

      /* ---- tiny DOM helper ---- */
      function el(tag, className, text) {
        var n = document.createElement(tag);
        if (className) n.className = className;
        if (text != null) n.textContent = text;
        return n;
      }

      /* ---- store lookups ---- */
      var VAULT = DATA.vault || {};
      var PAGES = VAULT.pages || [];
      var TICKERS = DATA.tickers || [];
      var THESES = DATA.theses || [];
      var CATS = DATA.categories || {};
      var MEMOS = (DATA.memos && DATA.memos.memos) || [];

      var pageBySlug = {};
      PAGES.forEach(function (p) { pageBySlug[p.slug] = p; });
      var tickerBySlug = {};      // slug -> ticker record
      TICKERS.forEach(function (t) { tickerBySlug[AIE.slugify(t.ticker)] = t; });
      var thesisById = {};
      THESES.forEach(function (t) { thesisById[t.id] = t; });

      var WIKI_RE = /\[\[([^\]]+)\]\]/g;
      function noteWikiSlugs(note) {
        var out = [], m; WIKI_RE.lastIndex = 0;
        while ((m = WIKI_RE.exec(note || "")) !== null) out.push(AIE.slugify(m[1].trim()));
        return out;
      }

      var TYPE_LABEL = { ticker: "Ticker", theme: "Theme", person: "Person",
                         event: "Event", concept: "Concept" };
      var TYPE_ORDER = { theme: 0, ticker: 1, person: 2, concept: 3, event: 4 };
      // NB: use hasOwnProperty, not `|| 99` — theme's rank is 0 (falsy).
      function typeRank(t) { return TYPE_ORDER.hasOwnProperty(t) ? TYPE_ORDER[t] : 99; }

      function pageHref(slug) { return "vault.html?page=" + encodeURIComponent(slug); }
      function isEnriched(p) { return !!(p.note && p.note.trim()); }

      /* Color for a page's type chip: a theme page slug IS a category id. */
      function typeChipColor(p) {
        if (p.type === "theme") return AIE.categoryColor(p.slug, null);
        if (p.type === "ticker") {
          var t = tickerBySlug[p.slug];
          return t ? AIE.categoryColor(t.category, null) : null;
        }
        return null;
      }

      function typeChip(p) {
        var chip = el("span", "aie-chip aie-chip--ticker", TYPE_LABEL[p.type] || p.type);
        var color = typeChipColor(p);
        if (color) chip.style.setProperty("--chip-accent", color);
        return chip;
      }

      /* ==================================================================
         INDEX VIEW  (?view=index — the default)
         ================================================================== */
      // List ↔ Graph — one "Vault" nav entry, two in-page views. The graph
      // keeps its ?view=graph URL so old links still land correctly.
      function viewToggle(active) {
        var wrap = el("div", "vlt-viewtoggle");
        [{ id: "list", label: "List", href: "vault.html" },
         { id: "graph", label: "Graph", href: "vault.html?view=graph" }].forEach(function (v) {
          var a = el("a", "aie-chip" + (v.id === active ? " is-active" : ""), v.label);
          a.href = v.href;
          if (v.id === active) a.setAttribute("aria-current", "page");
          wrap.appendChild(a);
        });
        return wrap;
      }

      function renderIndex() {
        AIE.renderNav("vault");
        document.title = "Vault — AI Infrastructure Explorer";
        var main = document.getElementById("vaultMain");
        main.textContent = "";

        if (!PAGES.length) {
          main.appendChild(indexEmpty());
          return;
        }

        var meta = VAULT.meta || {};
        var head = el("div", "vlt-head");
        head.appendChild(el("h1", "vlt-title", "The Vault"));
        var pc = meta.pageCount != null ? meta.pageCount : PAGES.length;
        var lc = meta.linkCount != null ? meta.linkCount : 0;
        head.appendChild(el("p", "vlt-count",
          pc + (pc === 1 ? " page" : " pages") + " · " + lc + (lc === 1 ? " link" : " links")));
        head.appendChild(viewToggle("list"));
        main.appendChild(head);

        // Type filter chips — only types that actually exist, in canonical order.
        var present = {};
        PAGES.forEach(function (p) { present[p.type] = true; });
        var types = Object.keys(present).sort(function (a, b) {
          return typeRank(a) - typeRank(b);
        });

        var filters = el("div", "vlt-filters");
        var rowsWrap = el("div", "vlt-rows");
        var active = "all";

        function draw() {
          rowsWrap.textContent = "";
          var shown = PAGES.filter(function (p) { return active === "all" || p.type === active; })
                           .slice()
                           .sort(function (a, b) {
                             var d = typeRank(a.type) - typeRank(b.type);
                             return d !== 0 ? d : a.title.localeCompare(b.title);
                           });
          shown.forEach(function (p) { rowsWrap.appendChild(indexRow(p)); });
          if (!shown.length) {
            rowsWrap.appendChild(el("p", "vlt-sec-empty", "No pages of this type."));
          }
        }

        function chip(label, value) {
          var c = el("span", "aie-chip" + (value === active ? " is-active" : ""), label);
          c.addEventListener("click", function () {
            active = value;
            Array.prototype.forEach.call(filters.children, function (ch) {
              ch.classList.toggle("is-active", ch === c);
            });
            draw();
          });
          return c;
        }

        filters.appendChild(chip("All", "all"));
        types.forEach(function (t) { filters.appendChild(chip(TYPE_LABEL[t] || t, t)); });
        main.appendChild(filters);
        main.appendChild(rowsWrap);
        draw();
      }

      function indexRow(p) {
        var row = el("a", "vlt-row");
        row.href = pageHref(p.slug);

        var title = el("div", "vlt-row-title");
        title.appendChild(document.createTextNode(p.title || p.slug));
        title.appendChild(el("span", "vlt-sub", TYPE_LABEL[p.type] || p.type));
        row.appendChild(title);

        var meta = el("div", "vlt-row-meta");
        var enriched = isEnriched(p);
        meta.appendChild(el("span", "vlt-status " + (enriched ? "vlt-status--enriched" : "vlt-status--stub"),
          enriched ? "enriched" : "stub"));
        meta.appendChild(el("span", "vlt-updated", p.noteUpdatedAt ? AIE.fmtDate(p.noteUpdatedAt) : "—"));
        row.appendChild(meta);
        return row;
      }

      function indexEmpty() {
        var box = el("div", "vlt-empty");
        box.appendChild(el("h1", null, "The vault is empty"));
        var p = el("p");
        p.appendChild(document.createTextNode("Pages are generated by "));
        p.appendChild(el("code", null, "ingest/vault_sync.py"));
        p.appendChild(document.createTextNode(" — run it, then regenerate "));
        p.appendChild(el("code", null, "data.js"));
        p.appendChild(document.createTextNode("."));
        box.appendChild(p);
        var actions = el("div", "vlt-actions");
        var a1 = el("a", "primary", "Coverage index"); a1.href = "index.html";
        var a2 = el("a", null, "The Desk"); a2.href = "desk.html";
        actions.appendChild(a1); actions.appendChild(a2);
        box.appendChild(actions);
        return box;
      }

      /* ==================================================================
         PAGE VIEW  (?page=slug)
         ================================================================== */
      function renderPage(page) {
        AIE.renderNav("vault");
        document.title = (page.title || "Vault") + " — AI Infrastructure Explorer";
        var main = document.getElementById("vaultMain");
        main.textContent = "";

        var article = el("article", "vlt-article");

        var eyebrow = el("div", "vlt-eyebrow");
        var back = el("a", "vlt-back", "← Vault index"); back.href = "vault.html";
        eyebrow.appendChild(back);
        eyebrow.appendChild(typeChip(page));
        article.appendChild(eyebrow);

        article.appendChild(el("h1", "vlt-page-title", page.title || page.slug));

        // Auto-stats strip (live).
        var stats = buildStats(page);
        if (stats) article.appendChild(stats);

        // Claude-owned note prose, or a stub hint.
        var note = el("div", "vlt-note");
        if (isEnriched(page)) {
          AIE.renderBody(page.note, "vlt-p").forEach(function (p) { note.appendChild(p); });
        } else {
          var hint = el("p", "vlt-note-empty");
          hint.appendChild(document.createTextNode("This page hasn't been enriched yet. Add prose with "));
          hint.appendChild(el("code", null, "/vault-note " + page.slug));
          hint.appendChild(document.createTextNode("."));
          note.appendChild(hint);
        }
        article.appendChild(note);

        // Auto sections: linked memos, cited theses, backlinks.
        var memos = relatedMemos(page);
        if (memos.length) article.appendChild(buildMemoSection(memos, page));

        var theses = citedTheses(page, memos);
        if (theses.length) article.appendChild(buildThesisSection(theses));

        var backlinks = backlinksTo(page.slug);
        if (backlinks.length) article.appendChild(buildBacklinkSection(backlinks));

        main.appendChild(article);
      }

      /* ---- stat strips per page type ---- */
      function statItem(label, valueNode) {
        var item = el("div", "vlt-stat");
        item.appendChild(el("span", "vlt-stat-label", label));
        var v = el("div", "vlt-stat-value");
        if (typeof valueNode === "string") v.appendChild(el("span", "mono", valueNode));
        else v.appendChild(valueNode);
        item.appendChild(v);
        return item;
      }

      function buildStats(page) {
        var strip = el("div", "vlt-stats");
        var n = 0;

        if (page.type === "ticker") {
          var t = tickerBySlug[page.slug];
          var stats = (page.auto && page.auto.stats) || {};
          if (t && t.company) { strip.appendChild(statItem("Company", el("span", null, t.company))); n++; }
          var tier = (t && t.tier) || stats.tier;
          if (tier) { strip.appendChild(statItem("Tier", el("span", "aie-badge aie-tier--" + tier, tier))); n++; }
          var cat = t && CATS[t.category];
          if (cat) {
            var catChip = el("span", "aie-chip aie-chip--ticker", cat.label || t.category);
            if (cat.color) catChip.style.setProperty("--chip-accent", cat.color);
            strip.appendChild(statItem("Layer", catChip)); n++;
          }
          if (t && t.price != null) {
            var pv = el("div", "vlt-stat-value");
            pv.appendChild(el("span", "mono", AIE.fmtNum(t.price, 2) + (t.currency ? " " + t.currency : "")));
            if (t.chg7d != null) pv.appendChild(el("span", "vlt-chg " + (t.chg7d >= 0 ? "up" : "down"), AIE.fmtPct(t.chg7d) + " 7d"));
            var pi = el("div", "vlt-stat"); pi.appendChild(el("span", "vlt-stat-label", "Price")); pi.appendChild(pv);
            strip.appendChild(pi); n++;
          }
          if (stats.mentions != null) { strip.appendChild(statItem("Mentions", String(stats.mentions))); n++; }
          if (stats.lastMentioned) { strip.appendChild(statItem("Last cited", AIE.fmtDate(stats.lastMentioned))); n++; }
          if (t && t.verdict && t.verdict.stance) {
            strip.appendChild(statItem("Desk stance", el("span", "aie-badge aie-stance--" + t.verdict.stance, t.verdict.stance))); n++;
          }
        } else if (page.type === "theme") {
          var s = (page.auto && page.auto.stats) || {};
          var cat2 = CATS[page.slug];
          if (cat2 && cat2.subtitle) { strip.appendChild(statItem("Layer", el("span", null, cat2.subtitle))); n++; }
          if (s.flowRole) { strip.appendChild(statItem("Flow role", s.flowRole)); n++; }
          if (s.memberCount != null) { strip.appendChild(statItem("Names", String(s.memberCount))); n++; }
          if (s.coreCount != null) { strip.appendChild(statItem("Core", String(s.coreCount))); n++; }
          if (s.watchCount != null) { strip.appendChild(statItem("Watch", String(s.watchCount))); n++; }
        } else if (page.type === "person") {
          var ps = (page.auto && page.auto.stats) || {};
          if (ps.handle) { strip.appendChild(statItem("Handle", ps.handle)); n++; }
          if (ps.themesCovered != null) { strip.appendChild(statItem("Themes covered", String(ps.themesCovered))); n++; }
        } else if (page.type === "concept") {
          var def = (page.auto && page.auto.stats && page.auto.stats.definition) || "";
          if (def) { strip.appendChild(statItem("Definition", el("span", null, def))); n++; }
        }

        return n ? strip : null;
      }

      /* ---- related content ---- */
      function memoLinksToPage(memo, page) {
        if (page.type === "ticker" && AIE.slugify(memo.ticker || "") === page.slug) return true;
        var blob = (memo.title || "") + " " + (memo.dek || "");
        (memo.sections || []).forEach(function (sec) { blob += " " + (sec.body || ""); });
        return noteWikiSlugs(blob).indexOf(page.slug) !== -1;
      }

      function memoDateDesc(a, b) {
        var da = a.publishedAt || a.updatedAt || "", db = b.publishedAt || b.updatedAt || "";
        return db < da ? -1 : (db > da ? 1 : 0);
      }

      function relatedMemos(page) {
        return MEMOS.filter(function (m) { return memoLinksToPage(m, page); }).sort(memoDateDesc);
      }

      // Cited theses = those cited by the linked memos, plus (ticker pages)
      // theses that mention the symbol directly. Newest first, capped.
      var THESIS_CAP = 12;
      function citedTheses(page, memos) {
        var ids = {};
        memos.forEach(function (m) { (m.sourceThesisIds || []).forEach(function (id) { ids[id] = true; }); });
        if (page.type === "ticker") {
          var t = tickerBySlug[page.slug];
          var sym = t && t.ticker;
          if (sym) THESES.forEach(function (th) {
            if ((th.tickers || []).indexOf(sym) !== -1) ids[th.id] = true;
          });
        }
        var out = Object.keys(ids).map(function (id) { return thesisById[id]; }).filter(Boolean);
        out.sort(function (a, b) {
          var da = a.postedAt || "", db = b.postedAt || "";
          return db < da ? -1 : (db > da ? 1 : 0);
        });
        return out.slice(0, THESIS_CAP);
      }

      // "What links here": pages whose auto.refs or note wikilinks target slug.
      function backlinksTo(slug) {
        var out = [];
        PAGES.forEach(function (p) {
          if (p.slug === slug) return;
          var refs = (p.auto && p.auto.refs) || [];
          var hit = refs.indexOf(slug) !== -1 || noteWikiSlugs(p.note).indexOf(slug) !== -1;
          if (hit) out.push(p);
        });
        out.sort(function (a, b) {
          var d = typeRank(a.type) - typeRank(b.type);
          return d !== 0 ? d : a.title.localeCompare(b.title);
        });
        return out;
      }

      /* ---- section builders ---- */
      function kindLabel(kind) {
        if (kind === "update") return "Update";
        if (kind === "exit-note") return "Exit note";
        if (kind === "coverage") return "Coverage note";
        return kind || "Note";
      }

      function buildMemoSection(memos, page) {
        var wrap = el("section", "vlt-sec");
        wrap.appendChild(el("h2", "vlt-sec-title", "Coverage · " + memos.length + (memos.length === 1 ? " memo" : " memos")));
        var ul = el("ul", "vlt-memos");
        memos.forEach(function (m) {
          var li = el("li");
          var a = el("a"); a.href = "memo.html?id=" + encodeURIComponent(m.id);
          a.appendChild(el("span", "vm-date", m.publishedAt ? AIE.fmtDate(m.publishedAt) : "—"));
          var mid = el("span"); mid.appendChild(el("span", "vm-title", m.title || m.id));
          a.appendChild(mid);
          a.appendChild(el("span", "vm-kind", kindLabel(m.kind)));
          li.appendChild(a); ul.appendChild(li);
        });
        wrap.appendChild(ul);
        return wrap;
      }

      function buildThesisSection(theses) {
        var wrap = el("section", "vlt-sec");
        wrap.appendChild(el("h2", "vlt-sec-title", "Evidence · " + theses.length + " cited " + (theses.length === 1 ? "thesis" : "theses")));
        var list = el("div", "vlt-sources");
        theses.forEach(function (th) { list.appendChild(AIE.makeThesisCard(th, { compact: true })); });
        wrap.appendChild(list);
        return wrap;
      }

      function buildBacklinkSection(pages) {
        var wrap = el("section", "vlt-sec");
        wrap.appendChild(el("h2", "vlt-sec-title", "What links here · " + pages.length));
        var links = el("div", "vlt-links");
        pages.forEach(function (p) {
          var a = el("a", "vlt-linkchip", p.title || p.slug);
          a.href = pageHref(p.slug);
          links.appendChild(a);
        });
        wrap.appendChild(links);
        return wrap;
      }

      function pageEmpty(slug) {
        var main = document.getElementById("vaultMain");
        main.textContent = "";
        var box = el("div", "vlt-empty");
        box.appendChild(el("h1", null, "Page not found"));
        var p = el("p");
        p.appendChild(document.createTextNode("No vault page matches "));
        p.appendChild(el("code", null, "page=" + slug));
        p.appendChild(document.createTextNode(". It may not have been synced yet."));
        box.appendChild(p);
        var actions = el("div", "vlt-actions");
        var a1 = el("a", "primary", "Vault index"); a1.href = "vault.html";
        var a2 = el("a", null, "Coverage index"); a2.href = "index.html";
        actions.appendChild(a1); actions.appendChild(a2);
        box.appendChild(actions);
        main.appendChild(box);
        document.title = "Page not found — AI Infrastructure Explorer";
      }

      /* ==================================================================
         GRAPH VIEW (?view=graph) — canvas 2D force-directed layout.
         Hand-written physics, no libraries: O(n²) pair repulsion (fine at
         ≤300 nodes; the vault is ~60), spring attraction along edges,
         mild centering gravity, velocity damping ~0.85 and a cooling
         alpha that restarts on drag / filter. Deterministic init: theme
         nodes pre-placed on a ring, everything else position-hashed from
         its slug — the same store always lays out the same way.
         ================================================================== */
      function hash01(s) {
        // FNV-1a → [0,1). Deterministic across sessions; no Math.random.
        var h = 2166136261;
        for (var i = 0; i < s.length; i++) {
          h ^= s.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return (h >>> 0) / 4294967296;
      }

      function renderGraph() {
        AIE.renderNav("vault");
        document.title = "Graph — AI Infrastructure Explorer";
        var main = document.getElementById("vaultMain");
        main.textContent = "";

        if (!PAGES.length) { main.appendChild(indexEmpty()); return; }

        /* ---- header (mirrors the index head) ---- */
        var meta = VAULT.meta || {};
        var head = el("div", "vlt-graph-head");
        var hleft = el("div");
        hleft.appendChild(el("h1", "vlt-title", "The Graph"));
        var pc = meta.pageCount != null ? meta.pageCount : PAGES.length;
        var lc = meta.linkCount != null ? meta.linkCount : 0;
        hleft.appendChild(el("p", "vlt-count",
          pc + (pc === 1 ? " page" : " pages") + " · " + lc + (lc === 1 ? " link" : " links")));
        hleft.appendChild(viewToggle("graph"));
        head.appendChild(hleft);
        main.appendChild(head);

        /* ---- stage ---- */
        var wrap = el("div", "vlt-graph-wrap");
        var canvas = document.createElement("canvas");
        wrap.appendChild(canvas);
        var legend = el("div", "vlt-glegend");
        wrap.appendChild(legend);
        var zoomBox = el("div", "vlt-gzoom");
        wrap.appendChild(zoomBox);
        var panel = el("aside", "vlt-gpanel");
        panel.hidden = true;
        wrap.appendChild(panel);
        main.appendChild(wrap);
        main.appendChild(el("p", "vlt-ghint",
          "Hover to trace links · click for details · drag to pin · double-click to release"));

        var ctx = canvas.getContext("2d");
        var reduced = window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        /* ---- node colors: theme = its data.js category color; the rest
               read theme.css tokens at runtime (light tints, glow on navy) */
        var rootStyle = getComputedStyle(document.documentElement);
        function token(name, fallback) {
          var v = rootStyle.getPropertyValue(name);
          return (v && v.trim()) || fallback;
        }
        var TYPE_COLOR = {
          ticker:  token("--card", "#ffffff"),
          person:  token("--sem-accumulate-bg", "#dde8ef"),
          concept: token("--sem-watch-bg", "#f4e7c8"),
          event:   token("--sem-act-bg", "#e4ecd7")
        };
        function nodeColor(n) {
          if (n.type === "theme") return AIE.categoryColor(n.slug, TYPE_COLOR.concept);
          return TYPE_COLOR[n.type] || TYPE_COLOR.ticker;
        }

        /* ---- build nodes + deduped undirected edges ---- */
        var nodes = PAGES.map(function (p) {
          return { slug: p.slug, type: p.type, title: p.title || p.slug, page: p,
                   x: 0, y: 0, vx: 0, vy: 0, fx: null, fy: null, degree: 0 };
        });
        var nodeBySlug = {};
        nodes.forEach(function (n) { nodeBySlug[n.slug] = n; });

        var edges = [], seenEdge = {};
        PAGES.forEach(function (p) {
          var targets = ((p.auto && p.auto.refs) || []).concat(noteWikiSlugs(p.note));
          targets.forEach(function (t) {
            if (t === p.slug || !nodeBySlug[t]) return;
            var key = p.slug < t ? p.slug + "|" + t : t + "|" + p.slug;
            if (seenEdge[key]) return;
            seenEdge[key] = true;
            edges.push({ a: nodeBySlug[p.slug], b: nodeBySlug[t] });
          });
        });
        edges.forEach(function (e) { e.a.degree++; e.b.degree++; });

        var neighbors = {}; // slug -> {slug: true}
        edges.forEach(function (e) {
          (neighbors[e.a.slug] = neighbors[e.a.slug] || {})[e.b.slug] = true;
          (neighbors[e.b.slug] = neighbors[e.b.slug] || {})[e.a.slug] = true;
        });

        function nodeRadius(n) {
          var r = (n.type === "theme" ? 9 : 4.5) + Math.sqrt(n.degree) * 1.5;
          return Math.min(r, 20);
        }

        /* ---- deterministic init: themes on a ring, others slug-hashed ---- */
        var RING = 250; // world units
        var themeNodes = nodes.filter(function (n) { return n.type === "theme"; })
                              .sort(function (a, b) { return a.slug.localeCompare(b.slug); });
        themeNodes.forEach(function (n, i) {
          var ang = (i / themeNodes.length) * Math.PI * 2 - Math.PI / 2;
          n.x = Math.cos(ang) * RING;
          n.y = Math.sin(ang) * RING;
        });
        nodes.forEach(function (n) {
          if (n.type === "theme") return;
          var ang = hash01(n.slug) * Math.PI * 2;
          var rad = RING * (0.15 + 0.8 * hash01(n.slug + "#r"));
          n.x = Math.cos(ang) * rad;
          n.y = Math.sin(ang) * rad;
        });

        /* ---- physics ----
           Repulsion must beat spring tension locally or the person-hub
           (45 spokes) collapses everything into one blob: equilibrium
           spacing solves REPULSE/d² ≈ stretch·SPRING, so keep the ratio
           high and cap per-pair force to stop close-range explosions. */
        var REPULSE = 26000, FORCE_CAP = 14;
        var SPRING = 0.018, GRAVITY = 0.005, DAMPING = 0.85;
        var ALPHA_DECAY = 0.986, ALPHA_MIN = 0.02;
        var alpha = 1;
        var hiddenTypes = {}; // legend toggles

        function isVisible(n) { return !hiddenTypes[n.type]; }

        function restLength(e) {
          // Rest length by node type. The person hub carries ~45 spokes, so
          // its edges are longest or the whole graph closes into a dense ball;
          // theme spokes 90, everything else short.
          if (e.a.type === "person" || e.b.type === "person") return 140;
          if (e.a.type === "theme" || e.b.type === "theme") return 90;
          return 60;
        }

        function tick() {
          var i, j, n, m, dx, dy, d2, d, f;
          var vis = nodes.filter(isVisible);
          // O(n²) pair repulsion.
          for (i = 0; i < vis.length; i++) {
            for (j = i + 1; j < vis.length; j++) {
              n = vis[i]; m = vis[j];
              dx = m.x - n.x; dy = m.y - n.y;
              d2 = dx * dx + dy * dy;
              if (d2 < 1) { d2 = 1; dx = 0.5; dy = 0.5; }
              f = Math.min(REPULSE / d2, FORCE_CAP) * alpha;
              d = Math.sqrt(d2);
              n.vx -= (dx / d) * f; n.vy -= (dy / d) * f;
              m.vx += (dx / d) * f; m.vy += (dy / d) * f;
            }
          }
          // Spring attraction along edges.
          edges.forEach(function (e) {
            if (!isVisible(e.a) || !isVisible(e.b)) return;
            var ddx = e.b.x - e.a.x, ddy = e.b.y - e.a.y;
            var dist = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
            var stretch = (dist - restLength(e)) * SPRING * alpha;
            var ux = ddx / dist, uy = ddy / dist;
            e.a.vx += ux * stretch; e.a.vy += uy * stretch;
            e.b.vx -= ux * stretch; e.b.vy -= uy * stretch;
          });
          // Mild centering gravity + integrate. Isolated nodes (degree 0 —
          // unlinked concepts) have no springs holding them, so repulsion
          // would push them off-canvas forever: give them stronger gravity
          // and they settle into a loose halo around the cluster instead.
          vis.forEach(function (nd) {
            var g = (nd.degree === 0 ? GRAVITY * 6 : GRAVITY) * alpha;
            nd.vx -= nd.x * g;
            nd.vy -= nd.y * g;
            nd.vx *= DAMPING; nd.vy *= DAMPING;
            if (nd.fx != null) { nd.x = nd.fx; nd.y = nd.fy; nd.vx = 0; nd.vy = 0; }
            else { nd.x += nd.vx; nd.y += nd.vy; }
          });
          alpha *= ALPHA_DECAY;
        }

        /* ---- viewport: devicePixelRatio scaling + pan/zoom ---- */
        var dpr = 1, cw = 0, ch = 0;
        var scale = 1, ox = 0, oy = 0;

        function fitScale() {
          // Frame the actual node bounds (not the nominal ring) with margin.
          var mx = RING, my = RING;
          nodes.forEach(function (n) {
            if (!isVisible(n)) return;
            mx = Math.max(mx, Math.abs(n.x));
            my = Math.max(my, Math.abs(n.y));
          });
          var s = Math.min(cw / (mx * 2.5), ch / (my * 2.35));
          return Math.min(Math.max(s, 0.2), 1.4);
        }
        function resetView() { scale = fitScale(); ox = 0; oy = 0; }
        var userAdjustedView = false; // pan/zoom disables the auto-refit

        function resizeCanvas() {
          dpr = window.devicePixelRatio || 1;
          var mw = wrap.clientWidth, mh = wrap.clientHeight;
          // A hidden/zero-sized boot (background tab, pane not laid out yet)
          // must not freeze scale at 0 — fall back and keep re-measuring.
          cw = mw > 0 ? mw : 1120;
          ch = mh > 0 ? mh : 560;
          sizeKnown = mw > 0 && mh > 0;
          canvas.width = Math.round(cw * dpr);
          canvas.height = Math.round(ch * dpr);
          draw();
        }
        var sizeKnown = false;
        function remeasureIfNeeded() {
          if (sizeKnown) return;
          if (wrap.clientWidth > 0 && wrap.clientHeight > 0) {
            resizeCanvas();
            resetView();
          }
        }
        function toScreen(n) {
          return { x: cw / 2 + ox + n.x * scale, y: ch / 2 + oy + n.y * scale };
        }
        function toWorld(sx, sy) {
          return { x: (sx - cw / 2 - ox) / scale, y: (sy - ch / 2 - oy) / scale };
        }

        /* ---- draw ---- */
        var hoverNode = null, selectedNode = null;

        function draw() {
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.clearRect(0, 0, cw, ch);
          var focus = hoverNode || selectedNode;
          var hood = focus ? (neighbors[focus.slug] || {}) : null;

          // Edges first.
          edges.forEach(function (e) {
            if (!isVisible(e.a) || !isVisible(e.b)) return;
            var lit = focus && (e.a === focus || e.b === focus);
            ctx.strokeStyle = lit ? "rgba(226, 232, 240, 0.55)"
                            : focus ? "rgba(226, 232, 240, 0.05)"
                                    : "rgba(226, 232, 240, 0.14)";
            ctx.lineWidth = lit ? 1.4 : 1;
            var A = toScreen(e.a), B = toScreen(e.b);
            ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
          });

          // Nodes.
          nodes.forEach(function (n) {
            if (!isVisible(n)) return;
            var dimmed = focus && n !== focus && !(hood && hood[n.slug]);
            var S = toScreen(n);
            var r = nodeRadius(n) * Math.min(scale * 1.15, 1.6);
            ctx.globalAlpha = dimmed ? 0.16 : 1;
            // soft glow behind focus + its hood
            if (!dimmed && focus && (n === focus || (hood && hood[n.slug]))) {
              ctx.beginPath(); ctx.arc(S.x, S.y, r + 5, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(226, 232, 240, 0.12)"; ctx.fill();
            }
            ctx.beginPath(); ctx.arc(S.x, S.y, r, 0, Math.PI * 2);
            ctx.fillStyle = nodeColor(n); ctx.fill();
            if (n === selectedNode) {
              ctx.strokeStyle = "rgba(226, 232, 240, 0.9)"; ctx.lineWidth = 1.6;
              ctx.beginPath(); ctx.arc(S.x, S.y, r + 3, 0, Math.PI * 2); ctx.stroke();
            }
            if (n.fx != null) { // pinned marker
              ctx.fillStyle = "rgba(15, 27, 46, 0.85)";
              ctx.beginPath(); ctx.arc(S.x, S.y, Math.max(r * 0.3, 1.6), 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1;
          });

          // Labels: themes always; focused node too.
          ctx.font = "600 10px " + token("--mono", "monospace");
          ctx.textAlign = "center";
          nodes.forEach(function (n) {
            if (!isVisible(n)) return;
            var isFocus = focus && n === focus;
            if (n.type !== "theme" && !isFocus) return;
            if (focus && !isFocus && !(hood && hood[n.slug]) && n !== focus) {
              if (n.type === "theme") ctx.globalAlpha = 0.25; else return;
            }
            var S = toScreen(n);
            var label = n.type === "ticker"
              ? n.slug.toUpperCase()
              : n.title.toUpperCase();
            var ly = S.y + nodeRadius(n) * Math.min(scale * 1.15, 1.6) + 13;
            ctx.fillStyle = "rgba(10, 18, 32, 0.85)";
            ctx.fillText(label, S.x + 0.8, ly + 0.8); // soft shadow for legibility
            ctx.fillStyle = isFocus ? "rgba(255, 255, 255, 0.95)" : "rgba(226, 232, 240, 0.72)";
            ctx.fillText(label, S.x, ly);
            ctx.globalAlpha = 1;
          });
        }

        /* ---- loop: pause when settled or the tab is hidden ---- */
        var raf = null;
        function frame() {
          raf = null;
          remeasureIfNeeded();
          tick(); draw();
          if (alpha > ALPHA_MIN && !document.hidden) {
            raf = requestAnimationFrame(frame);
          } else if (!userAdjustedView) {
            // Settled: re-frame the final layout once, gently.
            resetView(); draw();
          }
        }
        function kick(strength) {
          alpha = Math.max(alpha, strength || 0.5);
          if (reduced) { for (var i = 0; i < 60; i++) tick(); alpha = 0; draw(); return; }
          if (!raf && !document.hidden) raf = requestAnimationFrame(frame);
        }
        document.addEventListener("visibilitychange", function () {
          if (!document.hidden && alpha > ALPHA_MIN) kick(alpha);
        });

        /* ---- legend (toggles = the graph's type filter) ---- */
        var present = {};
        nodes.forEach(function (n) { present[n.type] = true; });
        Object.keys(present).sort(function (a, b) { return typeRank(a) - typeRank(b); })
          .forEach(function (t) {
            var btn = el("button", null);
            btn.type = "button";
            var dot = el("span", "dot");
            // legend dot: themes get a neutral multi-hue read via the first
            // category color; per-type tokens for the rest.
            dot.style.setProperty("--dot", t === "theme"
              ? AIE.categoryColor(Object.keys(CATS)[0], "#ffffff")
              : (TYPE_COLOR[t] || "#ffffff"));
            btn.appendChild(dot);
            btn.appendChild(document.createTextNode(TYPE_LABEL[t] || t));
            btn.addEventListener("click", function () {
              hiddenTypes[t] = !hiddenTypes[t];
              btn.classList.toggle("is-off", !!hiddenTypes[t]);
              if (selectedNode && hiddenTypes[selectedNode.type]) closePanel();
              if (hoverNode && hiddenTypes[hoverNode.type]) hoverNode = null;
              kick(0.6); // filter restarts the cooling alpha
              draw();
            });
            legend.appendChild(btn);
          });

        /* ---- zoom controls ---- */
        function zoomBy(factor) {
          userAdjustedView = true;
          var next = Math.min(3.2, Math.max(0.2, scale * factor));
          ox = ox * (next / scale); oy = oy * (next / scale);
          scale = next;
          draw();
        }
        [["+", function () { zoomBy(1.28); }],
         ["−", function () { zoomBy(1 / 1.28); }],
         ["⌂", function () { userAdjustedView = false; resetView(); draw(); }]].forEach(function (pair) {
          var b = el("button", null, pair[0]);
          b.type = "button";
          b.setAttribute("aria-label", pair[0] === "⌂" ? "Reset view" : (pair[0] === "+" ? "Zoom in" : "Zoom out"));
          b.addEventListener("click", pair[1]);
          zoomBox.appendChild(b);
        });

        /* ---- side panel ---- */
        function closePanel() { selectedNode = null; panel.hidden = true; draw(); }

        function openPanel(n) {
          selectedNode = n;
          panel.textContent = "";
          var close = el("button", "vlt-gpanel-close", "✕");
          close.type = "button";
          close.setAttribute("aria-label", "Close");
          close.addEventListener("click", closePanel);
          panel.appendChild(close);

          panel.appendChild(typeChip(n.page));
          panel.appendChild(el("h2", "vlt-gpanel-title", n.title));

          var stats = el("div", "vlt-gpanel-stats");
          function row(k, v) {
            if (v == null || v === "") return;
            var r = el("div", "vlt-gpanel-row");
            r.appendChild(el("span", "k", k));
            r.appendChild(el("span", "v", String(v)));
            stats.appendChild(r);
          }
          row("Links", n.degree);
          var s = (n.page.auto && n.page.auto.stats) || {};
          if (n.type === "ticker") {
            var t = tickerBySlug[n.slug];
            row("Tier", (t && t.tier) || s.tier);
            row("Mentions", s.mentions);
            if (t && CATS[t.category]) row("Layer", CATS[t.category].label);
            if (t && t.verdict) row("Desk", t.verdict.stance);
          } else if (n.type === "theme") {
            row("Names", s.memberCount);
            row("Core", s.coreCount);
            row("Flow", s.flowRole);
          } else if (n.type === "person") {
            row("Handle", s.handle);
            row("Themes", s.themesCovered);
          }
          row("Note", isEnriched(n.page) ? "enriched" : "stub");
          panel.appendChild(stats);

          var links = el("div", "vlt-gpanel-links");
          var pageA = el("a", "primary", "Open page →");
          pageA.href = pageHref(n.slug);
          links.appendChild(pageA);
          if (n.type === "ticker") {
            var t2 = tickerBySlug[n.slug];
            var memo = t2 && MEMOS.filter(function (m) {
              return (m.ticker || "").toUpperCase() === t2.ticker;
            }).sort(memoDateDesc)[0];
            if (memo) {
              var memoA = el("a", null, "Open memo →");
              memoA.href = "memo.html?id=" + encodeURIComponent(memo.id);
              links.appendChild(memoA);
            }
          }
          panel.appendChild(links);
          panel.hidden = false;
          draw();
        }

        /* ---- interactions: hover / click / drag-pin / pan / wheel-zoom ---- */
        function hitTest(sx, sy) {
          var W = toWorld(sx, sy), best = null, bestD = Infinity;
          nodes.forEach(function (n) {
            if (!isVisible(n)) return;
            var dx = n.x - W.x, dy = n.y - W.y;
            var d = Math.sqrt(dx * dx + dy * dy);
            var hitR = (nodeRadius(n) * Math.min(scale * 1.15, 1.6)) / scale + 6 / scale;
            if (d < hitR && d < bestD) { best = n; bestD = d; }
          });
          return best;
        }

        var dragNode = null, panning = false;
        var downX = 0, downY = 0, moved = false;

        function localXY(ev) {
          var rect = canvas.getBoundingClientRect();
          return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
        }

        canvas.addEventListener("pointerdown", function (ev) {
          var P = localXY(ev);
          downX = P.x; downY = P.y; moved = false;
          var n = hitTest(P.x, P.y);
          if (n) { dragNode = n; }
          else { panning = true; }
          canvas.classList.add("is-dragging");
          canvas.setPointerCapture(ev.pointerId);
        });

        canvas.addEventListener("pointermove", function (ev) {
          var P = localXY(ev);
          if (dragNode) {
            if (Math.abs(P.x - downX) + Math.abs(P.y - downY) > 3) moved = true;
            if (moved) {
              var W = toWorld(P.x, P.y);
              dragNode.fx = W.x; dragNode.fy = W.y;   // drag pins the node
              dragNode.x = W.x; dragNode.y = W.y;
              kick(0.35);                              // drag restarts alpha
              if (reduced) draw();
            }
            return;
          }
          if (panning) {
            if (Math.abs(P.x - downX) + Math.abs(P.y - downY) > 3) { moved = true; userAdjustedView = true; }
            ox += ev.movementX != null ? ev.movementX : 0;
            oy += ev.movementY != null ? ev.movementY : 0;
            draw();
            return;
          }
          var h = hitTest(P.x, P.y);
          if (h !== hoverNode) {
            hoverNode = h;
            canvas.classList.toggle("is-hover", !!h);
            draw();
          }
        });

        canvas.addEventListener("pointerup", function (ev) {
          canvas.classList.remove("is-dragging");
          var tapped = !moved;
          var P = localXY(ev);
          if (dragNode && tapped) {
            // a tap (not a drag): select, don't pin
            dragNode.fx = null; dragNode.fy = null;
            openPanel(dragNode);
          } else if (panning && tapped) {
            var n = hitTest(P.x, P.y);
            if (n) openPanel(n); else closePanel();
          }
          dragNode = null; panning = false;
        });

        canvas.addEventListener("pointerleave", function () {
          if (hoverNode) { hoverNode = null; canvas.classList.remove("is-hover"); draw(); }
        });

        canvas.addEventListener("dblclick", function (ev) {
          var P = localXY(ev);
          var n = hitTest(P.x, P.y);
          if (n && n.fx != null) { n.fx = null; n.fy = null; kick(0.4); }
        });

        canvas.addEventListener("wheel", function (ev) {
          ev.preventDefault();
          zoomBy(ev.deltaY < 0 ? 1.12 : 1 / 1.12);
        }, { passive: false });

        window.addEventListener("resize", resizeCanvas);

        /* ---- boot the simulation ---- */
        // Dev-only introspection hook (console): window.__aieGraph.state()
        window.__aieGraph = {
          nodes: nodes, edges: edges,
          step: function (n) { // drive the sim manually (headless QA)
            for (var i = 0; i < (n || 1); i++) tick();
            draw();
          },
          state: function () {
            return { alpha: alpha, scale: scale, ox: ox, oy: oy, cw: cw, ch: ch,
                     raf: raf != null,
                     sample: nodes.slice(0, 5).map(function (n) {
                       return n.slug + ":" + Math.round(n.x) + "," + Math.round(n.y);
                     }) };
          }
        };
        resizeCanvas();
        resetView();
        if (reduced) {
          // Settle synchronously and draw one static frame.
          for (var it = 0; it < 300; it++) tick();
          alpha = 0;
          draw();
        } else {
          raf = requestAnimationFrame(frame);
        }
      }

      /* ==================================================================
         Colophon disclaimer — memos.meta, then desk.meta, then generic.
         ================================================================== */
      function renderColophon() {
        var memoMeta = (DATA.memos && DATA.memos.meta) || {};
        var deskMeta = (DATA.desk && DATA.desk.meta) || {};
        var colo = document.getElementById("colophon");
        if (!colo) return;
        colo.appendChild(el("strong", null, "AI Infrastructure Explorer"));
        colo.appendChild(document.createTextNode(" — "));
        colo.appendChild(document.createTextNode(
          memoMeta.disclaimer || deskMeta.disclaimer ||
          "Personal research tool — not investment advice."));
      }

      /* ==================================================================
         Boot / router.
         ================================================================== */
      function boot() {
        renderColophon();
        var params = new URLSearchParams(window.location.search);
        var pageSlug = params.get("page");
        var view = params.get("view");

        if (pageSlug) {
          var page = pageBySlug[pageSlug];
          if (page) renderPage(page);
          else { AIE.renderNav("vault"); pageEmpty(pageSlug); }
          return;
        }
        if (view === "graph") { renderGraph(); return; }
        renderIndex();
      }

      boot();
    })();
  </script>
</body>
</html>
