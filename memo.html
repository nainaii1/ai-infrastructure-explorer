<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coverage memo — AI Supply Desk</title>

  <!-- ⚡ favicon: inline SVG data URI (no external request, works on file://) -->
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M13 2 4.5 13.5H11l-1 8.5L19.5 10H13z' fill='%233b82f6'/%3E%3C/svg%3E"
  />

  <!-- Shared editorial design tokens + components (masthead, chips, badges, .th-card, colophon). -->
  <link rel="stylesheet" href="shared/theme.css" />

  <style>
    /* memo.html-only layout. Tokens + components come from theme.css —
       nothing here redefines a token or an .aie-* / .th-card component. */

    .memo-shell { padding: 32px 0 8px; }

    /* Article column + sticky right-rail TOC. */
    .memo-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 48px;
      align-items: start;
    }
    .memo-article { min-width: 0; max-width: 720px; }

    /* ---- Header ---- */
    .memo-eyebrow {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .memo-eyebrow .sep { color: var(--border); }
    .memo-title {
      font-family: var(--serif); font-weight: 600;
      font-size: 40px; line-height: 1.12; letter-spacing: -0.02em;
      color: var(--ink); margin: 0 0 14px;
    }
    .memo-dek {
      font-family: var(--serif);
      font-size: 20px; line-height: 1.45; color: var(--muted);
      margin: 0 0 20px;
    }
    .memo-headmeta {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      font-family: var(--mono); font-size: 11px; letter-spacing: .04em; color: var(--muted);
      padding-bottom: 22px; border-bottom: 1px solid var(--border);
    }
    .memo-headmeta .sep { color: var(--border); }

    /* ---- Live snapshot strip (pulled from the ticker record, never authored) ---- */
    .memo-snap {
      display: flex; flex-wrap: wrap; gap: 14px 30px;
      margin: 24px 0 30px; padding: 16px 20px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-card); box-shadow: var(--shadow-sm);
    }
    .snap-item { display: flex; flex-direction: column; gap: 6px; }
    .snap-label {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    }
    .snap-value {
      font-family: var(--sans); font-size: 15px; font-weight: 600; color: var(--ink);
      display: flex; align-items: center; gap: 8px;
    }
    .snap-value .mono { font-family: var(--mono); font-weight: 600; }
    .snap-company { font-weight: 400; color: var(--muted); }
    .snap-chg { font-family: var(--mono); font-size: 12px; font-weight: 600; }
    .snap-chg.up   { color: #4d6a2b; }
    .snap-chg.down { color: #a13d2f; }
    .snap-note { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    /* ---- Sections ---- */
    .memo-section { margin: 32px 0; scroll-margin-top: 92px; }
    .memo-h2 {
      font-family: var(--serif); font-weight: 600;
      font-size: 24px; line-height: 1.2; letter-spacing: -0.01em;
      color: var(--ink); margin: 0 0 12px;
    }
    /* Body copy — serif 17px / 1.65 per spec. */
    .memo-p {
      font-family: var(--serif); font-size: 17px; line-height: 1.65;
      color: var(--text); margin: 0 0 16px;
    }
    .memo-p:last-child { margin-bottom: 0; }
    .memo-p strong { font-weight: 700; color: var(--ink); }
    /* $TICK chips + [[wikilinks]] are styled by shared .aie-tickerchip /
       .aie-wikilink in theme.css (emitted by AIE.renderInline). */

    /* ---- Right-rail TOC (desktop) ---- */
    .memo-toc { position: sticky; top: 84px; }
    .memo-toc-title {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
      margin: 0 0 12px;
    }
    .memo-toc a {
      display: block; font-family: var(--mono); font-size: 12px; line-height: 1.35;
      color: var(--muted); text-decoration: none;
      padding: 6px 0 6px 13px; border-left: 2px solid var(--border);
      transition: color var(--ease), border-color var(--ease);
    }
    .memo-toc a:hover { color: var(--ink); }
    .memo-toc a.is-active { color: var(--ink); border-left-color: var(--ink); }

    /* ---- Mobile "Contents" drill-down (hidden on desktop) ---- */
    .memo-toc-mobile { display: none; margin: 0 0 26px; }
    .memo-toc-toggle {
      display: flex; align-items: center; justify-content: space-between; width: 100%;
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; color: var(--text);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; cursor: pointer;
    }
    .memo-toc-toggle .chev { transition: transform var(--ease); }
    .memo-toc-toggle.is-open .chev { transform: rotate(180deg); }
    .drilldown { max-height: 0; overflow: hidden; transition: max-height var(--spring); }
    .memo-toc-mobile-inner { padding: 8px 2px 2px; }
    .memo-toc-mobile-inner a {
      display: block; font-family: var(--mono); font-size: 12.5px;
      color: var(--muted); text-decoration: none;
      padding: 8px 0 8px 13px; border-left: 2px solid var(--border);
    }
    .memo-toc-mobile-inner a.is-active { color: var(--ink); border-left-color: var(--ink); }

    /* ---- Appendices: sources + prior memos ---- */
    .memo-appendix { margin-top: 44px; padding-top: 26px; border-top: 1px solid var(--border); }
    .memo-appendix-title {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
      margin: 0 0 16px;
    }
    .memo-sources { display: flex; flex-direction: column; gap: 12px; }
    .memo-appendix-empty { font-family: var(--sans); font-size: 13.5px; color: var(--muted); margin: 0; }

    .memo-prior { list-style: none; margin: 0; padding: 0; }
    .memo-prior li { margin: 0; }
    .memo-prior a {
      display: flex; gap: 14px; align-items: baseline;
      padding: 12px 0; border-bottom: 1px solid var(--border);
      text-decoration: none; color: var(--text);
      transition: background var(--ease);
    }
    .memo-prior a:hover .mp-title { color: var(--ink); }
    .mp-date { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 82px; flex: 0 0 auto; }
    .mp-title { font-family: var(--serif); font-size: 15.5px; color: var(--ink); }
    .mp-kind { font-family: var(--mono); font-size: 10px; color: var(--muted); }

    /* ---- Empty state ---- */
    .memo-empty {
      max-width: 560px; margin: 64px auto; text-align: center;
      padding: 52px 34px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--r-card);
      box-shadow: var(--shadow-sm);
    }
    .memo-empty h1 { font-family: var(--serif); font-weight: 600; font-size: 28px; color: var(--ink); margin: 0 0 12px; }
    .memo-empty p { font-family: var(--sans); font-size: 15px; line-height: 1.6; color: var(--muted); margin: 0 0 22px; }
    .memo-empty p code {
      font-family: var(--mono); font-size: 13px;
      background: var(--paper-sink); padding: 1px 6px; border-radius: 4px;
    }
    .memo-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .memo-actions a {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase; text-decoration: none;
      padding: 9px 16px; border-radius: 8px;
      border: 1px solid var(--border); color: var(--text);
      transition: border-color var(--ease), color var(--ease), background var(--ease);
    }
    .memo-actions a:hover { border-color: var(--muted); color: var(--ink); background: var(--paper-sink); }
    .memo-actions a.primary { background: var(--ink); border-color: var(--ink); color: var(--card); }

    /* ---- Responsive: 768px breakpoint ---- */
    @media (max-width: 768px) {
      .memo-grid { grid-template-columns: 1fr; gap: 0; }
      .memo-toc { display: none; }           /* hide the sticky right rail */
      .memo-toc-mobile { display: block; }    /* surface the Contents drill-down */
      .memo-title { font-size: 30px; }
      .memo-dek { font-size: 18px; }
      .memo-snap { gap: 12px 22px; }
    }
  </style>
</head>
<body>
  <!-- 3px category-gradient border, painted at runtime by AIE.paintGradientBorder(). -->
  <div class="gradient-border" id="gradientBorder"></div>

  <!-- Shared top nav (theme.css). Rendered by AIE.renderNav('coverage') at boot. -->
  <div id="topNav"></div>

  <main class="aie-wrap memo-shell" id="memoMain"><!-- filled by boot() --></main>

  <footer class="aie-colophon" id="colophon"><!-- disclaimer from the store at boot --></footer>

  <!-- data.js MUST load first: defines window.AIE_DATA -->
  <script src="data.js"></script>
  <!-- Shared AIE namespace (seeding, nav, formatters, makeThesisCard). After data.js. -->
  <script src="shared/common.js"></script>

  <script>
    (function () {
      "use strict";
      var DATA = window.AIE_DATA || {};
      var AIE = window.AIE;

      // Shared boot: seed localStorage, paint the category gradient, render nav.
      AIE.seed();
      AIE.paintGradientBorder();
      AIE.renderNav("coverage");

      /* ---- tiny DOM helper ---- */
      function el(tag, className, text) {
        var n = document.createElement(tag);
        if (className) n.className = className;
        if (text != null) n.textContent = text;
        return n;
      }

      /* ---- lookups ---- */
      var TICKERS = DATA.tickers || [];
      var THESES = DATA.theses || [];
      var CATS = DATA.categories || {};
      var tickerBySym = {};
      TICKERS.forEach(function (t) { tickerBySym[t.ticker] = t; });
      var thesisById = {};
      THESES.forEach(function (t) { thesisById[t.id] = t; });

      /* ---- section-anchor slugs (unique within the page).
             AIE.slugify governs the token; uniqueness is memo-local. ---- */
      var usedIds = {};
      function uniqueSectionId(heading) {
        var base = "sec-" + AIE.slugify(heading), id = base, n = 2;
        while (usedIds[id]) { id = base + "-" + n; n++; }
        usedIds[id] = true;
        return id;
      }

      // Body renderer (**bold**, $TICK chips, [[wikilink]]) is shared —
      // AIE.renderBody in common.js. memo-p keeps this page's serif type scale.
      function renderBody(body) { return AIE.renderBody(body, "memo-p"); }

      /* ---- kind label ---- */
      function kindLabel(kind) {
        if (kind === "update") return "Update";
        if (kind === "exit-note") return "Exit note";
        if (kind === "coverage") return "Coverage note";
        return kind || "Note";
      }

      /* ==================================================================
         Snapshot strip — read LIVE from the ticker record (never authored).
         ================================================================== */
      function buildSnapshot(memo) {
        var t = tickerBySym[memo.ticker];
        var snap = el("div", "memo-snap");

        // Ticker + company (always shown, from the memo/ticker record).
        var symItem = el("div", "snap-item");
        symItem.appendChild(el("span", "snap-label", "Ticker"));
        var symVal = el("div", "snap-value");
        symVal.appendChild(el("span", "mono", memo.ticker));
        if (t && t.company) symVal.appendChild(el("span", "snap-company", t.company));
        symItem.appendChild(symVal);
        snap.appendChild(symItem);

        if (!t) {
          var note = el("div", "snap-item");
          note.appendChild(el("span", "snap-label", "Market data"));
          note.appendChild(el("span", "snap-note", "No live record for " + memo.ticker));
          snap.appendChild(note);
          return snap;
        }

        // Price + 7d change.
        if (t.price != null) {
          var priceItem = el("div", "snap-item");
          priceItem.appendChild(el("span", "snap-label", "Price"));
          var pv = el("div", "snap-value");
          pv.appendChild(el("span", "mono", AIE.fmtNum(t.price, 2) + (t.currency ? " " + t.currency : "")));
          if (t.chg7d != null) {
            var chg = el("span", "snap-chg " + (t.chg7d >= 0 ? "up" : "down"), AIE.fmtPct(t.chg7d) + " 7d");
            pv.appendChild(chg);
          }
          priceItem.appendChild(pv);
          snap.appendChild(priceItem);
        }

        // Market cap.
        if (t.marketCap != null) {
          var mcapItem = el("div", "snap-item");
          mcapItem.appendChild(el("span", "snap-label", "Market cap"));
          var mv = el("div", "snap-value");
          mv.appendChild(el("span", "mono", AIE.fmtMcap(t.marketCap)));
          mcapItem.appendChild(mv);
          snap.appendChild(mcapItem);
        }

        // Conviction tier badge.
        if (t.tier) {
          var tierItem = el("div", "snap-item");
          tierItem.appendChild(el("span", "snap-label", "Tier"));
          var tv = el("div", "snap-value");
          tv.appendChild(el("span", "aie-badge aie-tier--" + t.tier, t.tier));
          tierItem.appendChild(tv);
          snap.appendChild(tierItem);
        }

        // Category chip (dot accent painted from the category color).
        var cat = CATS[t.category];
        if (cat) {
          var catItem = el("div", "snap-item");
          catItem.appendChild(el("span", "snap-label", "Layer"));
          var cv = el("div", "snap-value");
          var catChip = el("span", "aie-chip aie-chip--ticker", cat.label || t.category);
          if (cat.color) catChip.style.setProperty("--chip-accent", cat.color);
          cv.appendChild(catChip);
          catItem.appendChild(cv);
          snap.appendChild(catItem);
        }

        // Desk stance (from the ticker's live verdict).
        if (t.verdict && t.verdict.stance) {
          var stanceItem = el("div", "snap-item");
          stanceItem.appendChild(el("span", "snap-label", "Desk stance"));
          var sv = el("div", "snap-value");
          sv.appendChild(el("span", "aie-badge aie-stance--" + t.verdict.stance, t.verdict.stance));
          stanceItem.appendChild(sv);
          snap.appendChild(stanceItem);
        }

        return snap;
      }

      /* ==================================================================
         TOC + scrollspy. Builds link lists for the desktop rail and the
         mobile "Contents" drill-down, wired to one IntersectionObserver.
         ================================================================== */
      function wireToc(tocEntries) {
        var linksById = {};   // sectionId -> [anchor elements in both lists]

        function makeTocLink(entry) {
          var a = el("a", null, entry.heading);
          a.href = "#" + entry.id;
          a.addEventListener("click", function () { closeMobileToc(); });
          (linksById[entry.id] = linksById[entry.id] || []).push(a);
          return a;
        }

        var rail = document.getElementById("tocRail");
        var mobileList = document.getElementById("tocMobileList");
        tocEntries.forEach(function (entry) {
          if (rail) rail.appendChild(makeTocLink(entry));
          if (mobileList) mobileList.appendChild(makeTocLink(entry));
        });

        function setActive(id) {
          Object.keys(linksById).forEach(function (k) {
            linksById[k].forEach(function (a) { a.classList.toggle("is-active", k === id); });
          });
        }

        var sections = tocEntries.map(function (e) { return document.getElementById(e.id); })
                                 .filter(Boolean);
        if ("IntersectionObserver" in window && sections.length) {
          var obs = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) {
              if (e.isIntersecting) setActive(e.target.id);
            });
          }, { rootMargin: "-72px 0px -75% 0px", threshold: 0 });
          sections.forEach(function (s) { obs.observe(s); });
          setActive(sections[0].id);
        }
      }

      /* ---- mobile Contents drill-down (reuses AIE.setDrilldownOpen) ---- */
      var mobileTocOpen = false;
      function closeMobileToc() {
        if (!mobileTocOpen) return;
        mobileTocOpen = false;
        var drill = document.getElementById("tocDrill");
        var inner = document.getElementById("tocMobileList");
        var toggle = document.getElementById("tocToggle");
        if (drill && inner) AIE.setDrilldownOpen(drill, inner, false);
        if (toggle) toggle.classList.remove("is-open");
      }
      function toggleMobileToc() {
        var drill = document.getElementById("tocDrill");
        var inner = document.getElementById("tocMobileList");
        var toggle = document.getElementById("tocToggle");
        if (!drill || !inner) return;
        mobileTocOpen = !mobileTocOpen;
        AIE.setDrilldownOpen(drill, inner, mobileTocOpen);
        if (toggle) toggle.classList.toggle("is-open", mobileTocOpen);
      }

      /* ==================================================================
         Prior memos for this ticker (excludes the one being viewed).
         ================================================================== */
      function publishedDesc(a, b) {
        var da = a.publishedAt || a.updatedAt || "";
        var db = b.publishedAt || b.updatedAt || "";
        return db < da ? -1 : (db > da ? 1 : 0);
      }

      function buildPriorList(memos, memo) {
        var prior = memos.filter(function (m) {
          return m.ticker === memo.ticker && m.id !== memo.id;
        }).sort(publishedDesc);
        if (!prior.length) return null;

        var wrap = el("section", "memo-appendix");
        wrap.appendChild(el("h2", "memo-appendix-title", "More on " + memo.ticker));
        var ul = el("ul", "memo-prior");
        prior.forEach(function (m) {
          var li = el("li");
          var a = el("a");
          a.href = "memo.html?id=" + encodeURIComponent(m.id);
          a.appendChild(el("span", "mp-date", m.publishedAt ? AIE.fmtDate(m.publishedAt) : "—"));
          var mid = el("span");
          mid.appendChild(el("span", "mp-title", m.title || m.id));
          a.appendChild(mid);
          a.appendChild(el("span", "mp-kind", kindLabel(m.kind)));
          li.appendChild(a);
          ul.appendChild(li);
        });
        wrap.appendChild(ul);
        return wrap;
      }

      /* ==================================================================
         Sources appendix — real thesis cards from sourceThesisIds.
         ================================================================== */
      function buildSources(memo) {
        var ids = memo.sourceThesisIds || [];
        if (!ids.length) return null;

        var wrap = el("section", "memo-appendix");
        wrap.appendChild(el("h2", "memo-appendix-title", "Sources · " + ids.length + " cited " + (ids.length === 1 ? "thesis" : "theses")));
        var list = el("div", "memo-sources");
        var found = 0;
        ids.forEach(function (id) {
          var th = thesisById[id];
          if (th) { list.appendChild(AIE.makeThesisCard(th)); found++; }
        });
        if (!found) {
          wrap.appendChild(el("p", "memo-appendix-empty",
            "The cited theses are not in the current store snapshot."));
        } else {
          wrap.appendChild(list);
        }
        return wrap;
      }

      /* ==================================================================
         Main render.
         ================================================================== */
      function renderMemo(memo, memos) {
        document.title = (memo.title || "Coverage memo") + " — AI Supply Desk";

        var grid = el("div", "memo-grid");
        var article = el("article", "memo-article");

        // Mobile Contents drill-down shell (populated by wireToc; CSS hides on desktop).
        var mtoc = el("div", "memo-toc-mobile");
        var toggle = el("button", "memo-toc-toggle"); toggle.type = "button"; toggle.id = "tocToggle";
        toggle.appendChild(el("span", null, "Contents"));
        toggle.appendChild(el("span", "chev", "▾"));
        toggle.addEventListener("click", toggleMobileToc);
        var drill = el("div", "drilldown"); drill.id = "tocDrill";
        var mList = el("div", "memo-toc-mobile-inner"); mList.id = "tocMobileList";
        drill.appendChild(mList);
        mtoc.appendChild(toggle); mtoc.appendChild(drill);
        article.appendChild(mtoc);

        // Header: eyebrow (kind · ticker), title, dek, meta (rating + dates).
        var eyebrow = el("div", "memo-eyebrow");
        eyebrow.appendChild(el("span", "aie-label", kindLabel(memo.kind)));
        eyebrow.appendChild(el("span", "sep aie-label", "·"));
        eyebrow.appendChild(el("span", "aie-label", memo.ticker));
        article.appendChild(eyebrow);

        article.appendChild(el("h1", "memo-title", memo.title || memo.ticker));
        if (memo.dek) article.appendChild(el("p", "memo-dek", memo.dek));

        var headmeta = el("div", "memo-headmeta");
        if (memo.rating) {
          headmeta.appendChild(el("span", "aie-badge aie-stance--" + memo.rating, memo.rating));
        }
        var pub = memo.publishedAt ? AIE.fmtDate(memo.publishedAt) : null;
        var upd = memo.updatedAt ? AIE.fmtDate(memo.updatedAt) : null;
        if (pub) {
          headmeta.appendChild(el("span", "sep", "·"));
          headmeta.appendChild(el("span", null, "Published " + pub));
        }
        if (upd && upd !== pub) {
          headmeta.appendChild(el("span", "sep", "·"));
          headmeta.appendChild(el("span", null, "Updated " + upd));
        }
        article.appendChild(headmeta);

        // Live snapshot strip.
        article.appendChild(buildSnapshot(memo));

        // Ordered sections + TOC entries.
        var tocEntries = [];
        (memo.sections || []).forEach(function (s) {
          if (!s || !s.heading) return;
          var id = uniqueSectionId(s.heading);
          tocEntries.push({ id: id, heading: s.heading });
          var section = el("section", "memo-section"); section.id = id;
          section.appendChild(el("h2", "memo-h2", s.heading));
          renderBody(s.body).forEach(function (p) { section.appendChild(p); });
          article.appendChild(section);
        });

        // Sources appendix, then prior-memos list.
        var sources = buildSources(memo);
        if (sources) article.appendChild(sources);
        var prior = buildPriorList(memos, memo);
        if (prior) article.appendChild(prior);

        // Right rail.
        var aside = el("aside", "memo-toc-wrap");
        var toc = el("nav", "memo-toc"); toc.setAttribute("aria-label", "On this page");
        toc.appendChild(el("p", "memo-toc-title", "On this page"));
        var rail = el("div"); rail.id = "tocRail";
        toc.appendChild(rail);
        aside.appendChild(toc);

        grid.appendChild(article);
        grid.appendChild(aside);

        var main = document.getElementById("memoMain");
        main.textContent = "";
        main.appendChild(grid);

        wireToc(tocEntries);
      }

      /* ==================================================================
         Empty state — unknown id/ticker or an empty store.
         ================================================================== */
      function renderEmpty(query) {
        var main = document.getElementById("memoMain");
        main.textContent = "";
        var box = el("div", "memo-empty");
        box.appendChild(el("h1", null, "Memo not found"));
        var p = el("p");
        if (query.id) {
          p.appendChild(document.createTextNode("No coverage memo matches "));
          p.appendChild(el("code", null, "id=" + query.id));
          p.appendChild(document.createTextNode("."));
        } else if (query.ticker) {
          p.appendChild(document.createTextNode("No coverage memo has been published for "));
          p.appendChild(el("code", null, query.ticker.toUpperCase()));
          p.appendChild(document.createTextNode(" yet."));
        } else {
          p.appendChild(document.createTextNode("Open a memo from the coverage index, or pass "));
          p.appendChild(el("code", null, "?id="));
          p.appendChild(document.createTextNode(" / "));
          p.appendChild(el("code", null, "?ticker="));
          p.appendChild(document.createTextNode("."));
        }
        box.appendChild(p);
        var actions = el("div", "memo-actions");
        var a1 = el("a", "primary", "Coverage index"); a1.href = "index.html";
        var a2 = el("a", null, "The Desk"); a2.href = "desk.html";
        actions.appendChild(a1); actions.appendChild(a2);
        box.appendChild(actions);
        main.appendChild(box);
        document.title = "Memo not found — AI Supply Desk";
      }

      /* ==================================================================
         Colophon disclaimer — memos.meta, then desk.meta, then generic.
         ================================================================== */
      function renderColophon() {
        var memoMeta = (DATA.memos && DATA.memos.meta) || {};
        var deskMeta = (DATA.desk && DATA.desk.meta) || {};
        var colo = document.getElementById("colophon");
        if (!colo) return;
        colo.appendChild(el("strong", null, "AI Supply Desk"));
        colo.appendChild(document.createTextNode(" — "));
        colo.appendChild(document.createTextNode(
          memoMeta.disclaimer || deskMeta.disclaimer ||
          "Personal research tool — not investment advice."));
      }

      /* ==================================================================
         Boot.
         ================================================================== */
      function boot() {
        renderColophon();

        var params = new URLSearchParams(window.location.search);
        var query = { id: params.get("id"), ticker: params.get("ticker") };

        var store = DATA.memos || {};
        var memos = store.memos || [];
        var memo = null;

        if (query.id) {
          memo = memos.find(function (m) { return m.id === query.id; }) || null;
        } else if (query.ticker) {
          var sym = query.ticker.toUpperCase();
          memo = memos.filter(function (m) { return (m.ticker || "").toUpperCase() === sym; })
                      .sort(publishedDesc)[0] || null;
        }

        if (memo) renderMemo(memo, memos);
        else renderEmpty(query);
      }

      boot();
    })();
  </script>
</body>
</html>
