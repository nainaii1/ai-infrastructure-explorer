        </div>
      </section>

      <section
        class="tab-panel"
        id="tab-thesis"
        role="tabpanel"
        aria-labelledby="tab-btn-thesis"
        hidden
      >
        <div class="th-header">
          <div class="wl-ledger">
            <span class="ledger-eyebrow">Thesis</span>
            <span class="ledger-scope" id="thScope"></span>
          </div>
          <span class="th-count" id="thCount"></span>
        </div>
        <div class="th-filters" id="thFilters"></div>
        <div class="th-feed" id="thFeed"></div>
      </section>

      <!-- Tab 4: Brain. Synthesized per-theme digests, built by renderBrain()
           from AIE_DATA.brain (produced by ingest/synthesize.py). Each digest
           expands to reveal the raw source theses behind it. -->
      <section
        class="tab-panel"
        id="tab-brain"
        role="tabpanel"
        aria-labelledby="tab-btn-brain"
        hidden
      >
        <div class="th-header">
          <div class="wl-ledger">
            <span class="ledger-eyebrow">Brain</span>
            <span class="ledger-scope" id="brainScope"></span>
          </div>
          <span class="th-count" id="brainMeta"></span>
        </div>
        <div id="brainFeed"></div>
      </section>
    </main>
  </div>

  <!-- data.js MUST load first: defines window.AIE_DATA -->
  <script src="data.js"></script>

  <!-- App script (T1 scope: seeding + gradient + tab switching) -->
  <script>
    (function () {
      "use strict";

      var DATA = window.AIE_DATA;

      /* ----------------------------------------------------------
         localStorage seeding — version-aware so the backend ingest
         pipeline (which regenerates data.js + bumps meta.version)
         actually surfaces for returning users.
         - tickers: seeded once; on a version bump, NEW tickers from
           data.js are merged in (existing entries / edits preserved).
         - theses: backend-owned — (re)seeded from data.js on a bump.
         Static config (categories/center/countries/priorities) is read
         directly from AIE_DATA, never persisted (CLAUDE.md rule #4).
         ---------------------------------------------------------- */
      var STORAGE_KEYS = {
        tickers: "aie_tickers",
        theses: "aie_theses",
        settings: "aie_settings"
      };

      function readJSON(key) {
        try {
          var raw = localStorage.getItem(key);
          return raw === null ? null : JSON.parse(raw);
        } catch (err) {
          return null;
        }
      }

      function seedLocalStorage() {
        if (!DATA) {
          console.error("AIE_DATA missing — data.js failed to load before app script.");
          return;
        }
        try {
          var dataVersion = (DATA.meta && DATA.meta.version) || "1.0";
          var settings = readJSON(STORAGE_KEYS.settings);
          var firstRun = settings === null;
          var seededVersion = settings && settings.version;
          var versionChanged = seededVersion !== dataVersion;

          // tickers: seed on first run; on a version bump, refresh static fields
          // from data.js (the source of truth) while preserving the user's
          // per-ticker rating. Locally-added tickers not in data.js are kept.
          var tickers = readJSON(STORAGE_KEYS.tickers);
          if (tickers === null) {
            tickers = (DATA.tickers || []).slice();
          } else if (versionChanged) {
            var ratingBy = {};
            tickers.forEach(function (t) { if (t.rating) ratingBy[t.ticker] = t.rating; });
            var refreshed = (DATA.tickers || []).map(function (d) {
              if (!ratingBy[d.ticker]) return d;
              var copy = {};
              for (var k in d) { copy[k] = d[k]; }
              copy.rating = ratingBy[d.ticker];   // keep only the user's rating
              return copy;
            });
            var known = {};
            refreshed.forEach(function (t) { known[t.ticker] = true; });
            tickers.forEach(function (t) { if (!known[t.ticker]) refreshed.push(t); });
            tickers = refreshed;
          }
          localStorage.setItem(STORAGE_KEYS.tickers, JSON.stringify(tickers));

          // theses: backend-owned — (re)seed from data.js on first run or bump.
          if (firstRun || versionChanged || readJSON(STORAGE_KEYS.theses) === null) {
            localStorage.setItem(STORAGE_KEYS.theses, JSON.stringify(DATA.theses || []));
          }

          // settings: record the data.js version we have now seeded from.
          localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify({
            version: dataVersion,
            lastUpdated: (DATA.meta && DATA.meta.lastUpdated) || null
          }));
        } catch (err) {
          // Some browsers restrict localStorage under file:// — fail gracefully.
          console.warn("localStorage unavailable; seeding skipped.", err);
        }
      }

      /* ----------------------------------------------------------
         Paint the 3px gradient top border from category colors.
         Colors are read from data.js — never hardcoded (rule #4).
         ---------------------------------------------------------- */
      function paintGradientBorder() {
        var el = document.getElementById("gradientBorder");
        if (!el || !DATA || !DATA.categories) return;

        var colors = Object.keys(DATA.categories).map(function (id) {
          return DATA.categories[id].color;
        });
        if (colors.length === 0) return;

        el.style.background =
          "linear-gradient(to right, " + colors.join(", ") + ")";
      }

      /* ----------------------------------------------------------
         Sparkline — deterministic per-seed synthetic trend line, used
         as a "Trend (sample)" placeholder until real daily price/mention
         history is wired in. Same seed always draws the same shape.
         ---------------------------------------------------------- */
      function mulberry32(seed) {
        var t = seed >>> 0;
        return function () {
          t += 0x6D2B79F5;
          var r = Math.imul(t ^ (t >>> 15), 1 | t);
          r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
          return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
        };
      }
      function hashStr(str) {
        var h = 0;
        for (var i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
        return Math.abs(h);
      }
      function sparkValues(seedStr, n) {
        var rng = mulberry32(hashStr(seedStr));
        var v = 50, out = [];
        for (var i = 0; i < n; i++) { v += (rng() - 0.48) * 14; v = Math.max(8, Math.min(92, v)); out.push(v); }
        return out;
      }
      function sparkPath(values, w, h) {
        var step = w / (values.length - 1);
        return "M" + values.map(function (v, i) {
          return (i * step).toFixed(1) + "," + (h - (v / 100) * h).toFixed(1);
        }).join(" L");
      }
      // Build an inline <svg><path> sparkline seeded from `seedStr` (e.g. a ticker symbol).
      function sparkSVG(seedStr, w, h) {
        var ns = "http://www.w3.org/2000/svg";
        var svg = document.createElementNS(ns, "svg");
        svg.setAttribute("viewBox", "0 0 " + w + " " + h);
        svg.setAttribute("width", w);
        svg.setAttribute("height", h);
        svg.setAttribute("aria-hidden", "true");
        svg.classList.add("spark-svg");
        var path = document.createElementNS(ns, "path");
        path.setAttribute("d", sparkPath(sparkValues(seedStr, 16), w, h));
        path.setAttribute("class", "spark-path");
        svg.appendChild(path);
        return svg;
      }
      // Scale small integer counts (e.g. daily mention counts) onto the same
      // 8-92 visual range sparkValues() uses, so the line isn't flat-lined.
      function countsToSparkPath(counts, w, h) {
        var max = Math.max.apply(null, counts.concat([1]));
        var scaled = counts.map(function (c) { return 8 + (c / max) * 84; });
        return sparkPath(scaled, w, h);
      }
      // ↑/↓/→ by comparing the sum of the first half of a count series vs the second half.
      function trendArrow(counts) {
        if (!counts || counts.length < 2) return "→";
        var mid = Math.floor(counts.length / 2);
        var first = counts.slice(0, mid).reduce(function (a, b) { return a + b; }, 0);
        var second = counts.slice(mid).reduce(function (a, b) { return a + b; }, 0);
        if (second > first) return "↑";
        if (second < first) return "↓";
        return "→";
      }

      /* ----------------------------------------------------------
         Tab switching with fade transition.
         ---------------------------------------------------------- */
      function initTabs() {
        var buttons = Array.prototype.slice.call(
          document.querySelectorAll(".tab-btn")
        );

        function activate(targetId) {
          buttons.forEach(function (btn) {
            var isActive = btn.getAttribute("data-target") === targetId;
            btn.setAttribute("aria-selected", isActive ? "true" : "false");
          });

          document.querySelectorAll(".tab-panel").forEach(function (panel) {
            var isActive = panel.id === targetId;
            panel.classList.toggle("active", isActive);
            if (isActive) {
              panel.removeAttribute("hidden");
            } else {
              panel.setAttribute("hidden", "");
            }
          });
        }

        buttons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            activate(btn.getAttribute("data-target"));
          });
        });
      }

      /* ----------------------------------------------------------
         Value-chain layers (Tab 1, Section A).
         Built from AIE_DATA as a bottom→top stack of HTML bands —
         no SVG. Colors/labels/tooltips come from data.js (rule #4);
         ordering comes from each category's `layer` field.
         Clicking a layer filters the ticker cards in Section B.
         ---------------------------------------------------------- */
      var mapState = { selectedId: null, view: "pipeline" };

      function getCategoryCounts() {
        var counts = {};
        getStoredTickers().forEach(function (t) {
          counts[t.category] = (counts[t.category] || 0) + 1;
        });
        return counts;
      }

      function makeLayerBand(opts) {
        // opts: { id, indexLabel, title, sub, desc, color, count, isHub }
        var band = el("div", "layer-band" + (opts.isHub ? " layer-hub" : ""));
        band.setAttribute("role", "listitem");
        if (opts.color) band.style.setProperty("--accent", opts.color);
        if (opts.id) band.dataset.cat = opts.id;

        band.appendChild(el("span", "layer-index", opts.indexLabel));

        var main = el("div", "layer-main");
        var title = el("div", "layer-title");
        title.appendChild(document.createTextNode(opts.title + " "));
        if (opts.sub) title.appendChild(el("span", "layer-sub", "· " + opts.sub));
        main.appendChild(title);
        if (opts.desc) main.appendChild(el("p", "layer-desc", opts.desc));
        // Investor angle — revealed when the layer is selected (see .is-active CSS).
        if (opts.angle) {
          var detail = el("div", "layer-detail");
          detail.appendChild(el("span", "layer-detail-label", "What to watch"));
          detail.appendChild(el("p", "layer-detail-text", opts.angle));
          main.appendChild(detail);
        }
        band.appendChild(main);

        if (!opts.isHub) {
          var count = el("span", "layer-count");
          count.appendChild(el("b", null, String(opts.count)));
          count.appendChild(document.createTextNode(opts.count === 1 ? " co" : " cos"));
          band.appendChild(count);
        }
        return band;
      }

      // A labeled break that chunks the pipeline into flow zones.
      function makeZoneDivider(label, muted) {
        var div = el("div", "zone-divider" + (muted ? " zone-divider--muted" : ""));
        div.setAttribute("role", "presentation");
        div.appendChild(el("span", "zone-label", label));
        return div;
      }

      // A small dashed flow-arrow between pipeline columns.
      function makeFlowArrow() {
        var wrap = el("div", "mp-arrow");
        wrap.innerHTML = '<svg width="28" height="16" viewBox="0 0 28 16" aria-hidden="true">'
          + '<line x1="1" y1="8" x2="20" y2="8" stroke="currentColor" stroke-width="2" stroke-dasharray="3 3"/>'
          + '<path d="M15 2 L23 8 L15 14" fill="none" stroke="currentColor" stroke-width="2" '
          + 'stroke-linejoin="round" stroke-linecap="round"/></svg>';
        return wrap;
      }

      // Build one interactive, filterable layer band for a category id, appended to `container`.
      function appendLayerBand(container, id, counts) {
        var c = DATA.categories[id];
        var band = makeLayerBand({
          id: id,
          indexLabel: "L" + (c.layer != null ? c.layer : "?"),
          title: c.label, sub: c.subtitle, desc: c.tooltip, angle: c.investorAngle,
          color: c.color, count: counts[id] || 0
        });
        band.setAttribute("tabindex", "0");
        band.setAttribute("aria-pressed", "false");
        band.addEventListener("click", function () { setFilter(id); });
        band.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setFilter(id); }
        });
        container.appendChild(band);
      }

      /* Pipeline view — three flex columns (Supply -> Chip -> Demand), each a
         vertical stack of .layer-band cards sorted by `layer`; the NVIDIA +
         Hyperscalers hub sits centered below the row. */
      function renderPipeline() {
        var root = document.getElementById("mapPipeline");
        if (!root || !DATA || !DATA.categories || !DATA.center) return;
        root.innerHTML = "";

        var counts = getCategoryCounts();
        var byLayerDesc = function (a, b) {
          return (DATA.categories[b].layer || 0) - (DATA.categories[a].layer || 0);
        };

        var cols = el("div", "mp-columns");
        var order = [
          { role: "supply", label: "Supply" },
          { role: "chip", label: "Chip" },
          { role: "demand", label: "Demand" }
        ];
        var placed = {};
        order.forEach(function (o, i) {
          if (i > 0) cols.appendChild(makeFlowArrow());
          var col = el("div", "mp-col");
          col.setAttribute("role", "list");
          col.appendChild(el("span", "mp-col-label", o.label));
          var ids = Object.keys(DATA.categories).filter(function (id) {
            return DATA.categories[id].flowRole === o.role;
          }).sort(byLayerDesc);
          ids.forEach(function (id) { placed[id] = true; appendLayerBand(col, id, counts); });
          cols.appendChild(col);
        });
        root.appendChild(cols);

        var hubWrap = el("div", "mp-hub");
        hubWrap.appendChild(makeLayerBand({
          isHub: true, indexLabel: "DEMAND",
          title: DATA.center.title, sub: DATA.center.subtitle, desc: DATA.center.tooltip
        }));
        root.appendChild(hubWrap);

        // Anything without a flowRole (e.g. unsorted) drops into a triage footer.
        var leftover = Object.keys(DATA.categories)
          .filter(function (id) { return !placed[id]; })
          .sort(byLayerDesc);
        if (leftover.length) {
          root.appendChild(makeZoneDivider("Triage · awaiting classification", true));
          var footer = el("div", "mp-col");
          leftover.forEach(function (id) { appendLayerBand(footer, id, counts); });
          root.appendChild(footer);
        }
      }

      /* Cross Section view — one flex row of bar divs on a dark blueprint
         background, height proportional to ticker count per category. */
      function renderCrossSection() {
        var root = document.getElementById("mapCross");
        if (!root || !DATA || !DATA.categories) return;
        root.innerHTML = "";

        var counts = getCategoryCounts();
        var byLayerDesc = function (a, b) {
          return (DATA.categories[b].layer || 0) - (DATA.categories[a].layer || 0);
        };
        var ids = Object.keys(DATA.categories)
          .filter(function (id) { return DATA.categories[id].flowRole; })
          .sort(byLayerDesc);
        var maxCount = Math.max.apply(null, ids.map(function (id) { return counts[id] || 0; }).concat([1]));

        var bars = el("div", "mc-bars");
        ids.forEach(function (id) {
          var c = DATA.categories[id];
          var n = counts[id] || 0;
          var col = el("div", "mc-col");
          col.dataset.cat = id;
          col.setAttribute("tabindex", "0");
          col.setAttribute("role", "button");
          col.setAttribute("aria-pressed", "false");
          col.title = c.label;

          var bar = el("div", "mc-bar");
          bar.style.height = Math.max(4, (n / maxCount) * 170) + "px";
          bar.style.background = "color-mix(in srgb, " + c.color + " 55%, #0f1b2e)";
          col.appendChild(bar);
          col.appendChild(el("span", "mc-count", String(n)));
          col.appendChild(el("span", "mc-label", c.label));

          col.addEventListener("click", function () { setFilter(id); });
          col.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setFilter(id); }
          });
          bars.appendChild(col);
        });
        root.appendChild(bars);
      }

      // Dispatch to the active map view. Both views share the same intro line,
      // and both wire clicks through setFilter()/renderCards().
      function renderMap() {
        var pipelineEl = document.getElementById("mapPipeline");
        var crossEl = document.getElementById("mapCross");
        if (!pipelineEl || !crossEl || !DATA) return;

        var intro = document.getElementById("mapIntro");
        if (intro) intro.textContent = DATA.mapIntro || "";

        if (mapState.view === "cross") {
          pipelineEl.hidden = true; crossEl.hidden = false;
          renderCrossSection();
        } else {
          crossEl.hidden = true; pipelineEl.hidden = false;
          renderPipeline();
        }
      }

      function initMapViewToggle() {
        var buttons = Array.prototype.slice.call(document.querySelectorAll("#mapViewToggle .vt-btn"));
        buttons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            mapState.view = btn.getAttribute("data-view");
            buttons.forEach(function (b) { b.setAttribute("aria-selected", b === btn ? "true" : "false"); });
            renderMap();
          });
        });
        var showAll = document.getElementById("mapShowAll");
        if (showAll) {
          showAll.addEventListener("click", function () { setFilter(null, true); });
        }
      }

      // Toggle the active layer and filter Section B accordingly.
      function setFilter(id, forceClear) {
        mapState.selectedId = forceClear
          ? null
          : (mapState.selectedId === id ? null : id);

        document.querySelectorAll(".layer-band[data-cat]").forEach(function (b) {
          var on = b.dataset.cat === mapState.selectedId;
          b.classList.toggle("is-active", on);
          b.setAttribute("aria-pressed", on ? "true" : "false");
        });
        document.querySelectorAll(".mc-col[data-cat]").forEach(function (b) {
          var on = b.dataset.cat === mapState.selectedId;
          b.classList.toggle("is-active", on);
          b.setAttribute("aria-pressed", on ? "true" : "false");
        });
        renderCards(mapState.selectedId);
      }

      /* ----------------------------------------------------------
         Ticker cards (Tab 1, Section B).
         Reads tickers from localStorage (per the seeding
         architecture) so user edits persist; reads category /
         country config from AIE_DATA. Filtered by map selection.
         ---------------------------------------------------------- */
      var TIER_RANK = { Mega: 4, Large: 3, Mid: 2, Small: 1 };

      function getStoredTickers() {
        try {
          var raw = localStorage.getItem(STORAGE_KEYS.tickers);
          if (raw) return JSON.parse(raw);
        } catch (err) {
          console.warn("Could not read stored tickers; using AIE_DATA.", err);
        }
        return (DATA && DATA.tickers) || [];
      }

      function el(tag, className, text) {
        var node = document.createElement(tag);
        if (className) node.className = className;
        if (text != null) node.textContent = text;
        return node;
      }

      function makeCard(ticker, index) {
        var cat = (DATA.categories && DATA.categories[ticker.category]) || null;
        var country = (DATA.countries && DATA.countries[ticker.market]) || null;
        var accent = cat ? cat.color : "#64748b";

        var card = el("article", "tk-card");
        card.style.setProperty("--accent", accent);
        card.style.animationDelay = (index * 45) + "ms";

        // Header: ticker + company
        var head = el("div", "tk-head");
        head.appendChild(el("div", "tk-ticker", ticker.ticker));
        head.appendChild(el("div", "tk-company", ticker.company));
        card.appendChild(head);

        // Badges: category pill, market (flag + exchange), tier meter
        var badges = el("div", "tk-badges");
        if (cat) badges.appendChild(el("span", "tk-badge tk-cat", cat.label));

        var market = el("span", "tk-badge tk-market");
        if (country) {
          var flag = el("span", "flag", country.flag);
          flag.setAttribute("aria-hidden", "true");
          market.appendChild(flag);
        }
        market.appendChild(document.createTextNode(ticker.exchange || ticker.market || ""));
        badges.appendChild(market);

        if (ticker.priority) {
          var prio = el("span", "tk-badge tk-prio", ticker.priority.mentions + "× mentioned");
          prio.title = "Mentioned " + ticker.priority.mentions + "× by @aleabitoreddit"
            + (ticker.priority.convictionHits ? " · " + ticker.priority.convictionHits + " with high-conviction language" : "");
          badges.appendChild(prio);
        }

        var tier = el("span", "tk-tier");
        tier.appendChild(el("span", "tk-tier-label", ticker.marketCapTier || "—"));
        var meter = el("span", "tk-meter");
        var rank = TIER_RANK[ticker.marketCapTier] || 0;
        for (var s = 1; s <= 4; s++) meter.appendChild(el("i", s <= rank ? "on" : null));
        tier.appendChild(meter);
        badges.appendChild(tier);
        card.appendChild(badges);

        // Trend (sample) — synthetic sparkline placeholder until real daily
        // price history lands; seeded from the ticker so it's stable per card.
        var trend = el("div", "tk-trend");
        trend.style.setProperty("color", accent);
        trend.appendChild(el("span", "tk-trend-label", "Trend (sample)"));
        trend.appendChild(sparkSVG(ticker.ticker, 70, 26));
        card.appendChild(trend);

        // Body: two labeled prose blocks
        var body = el("dl", "tk-body");
        function row(label, value) {
          var r = el("div", "row");
          r.appendChild(el("dt", null, label));
          r.appendChild(el("dd", null, value));
          return r;
        }
        body.appendChild(row("What they do", ticker.whatTheyDo || ""));
        body.appendChild(row("Why NVDA needs them", ticker.whyNVDA || ""));
        card.appendChild(body);

        return card;
      }

      function renderCards(catId) {
        var grid = document.getElementById("cardGrid");
        var scope = document.getElementById("cardScope");
        if (!grid || !DATA) return;

        var all = getStoredTickers();
        var list = catId ? all.filter(function (t) { return t.category === catId; }) : all;

        // Scope caption (mono ledger line).
        if (scope) {
          if (catId && DATA.categories[catId]) {
            scope.innerHTML = "";
            scope.appendChild(document.createTextNode(DATA.categories[catId].label + " · "));
            var n1 = el("b", null, String(list.length));
            scope.appendChild(n1);
            scope.appendChild(document.createTextNode(list.length === 1 ? " company" : " companies"));
          } else {
            scope.innerHTML = "";
            scope.appendChild(document.createTextNode("All sectors · "));
            scope.appendChild(el("b", null, String(list.length)));
            scope.appendChild(document.createTextNode(list.length === 1 ? " company" : " companies"));
          }
        }

        grid.innerHTML = "";

        if (list.length === 0) {
          // Empty state — e.g. Networking has zero tickers in v1.
          var empty = el("div", "cards-empty");
          if (catId && DATA.categories[catId]) {
            empty.style.setProperty("--accent", DATA.categories[catId].color);
          }
          empty.appendChild(el("h3", null, "No tickers tracked yet"));
          var note = catId && DATA.categories[catId]
            ? "Nothing in " + DATA.categories[catId].label + " for now — coming in a future update."
            : "No companies to show.";
          empty.appendChild(el("p", null, note));
          grid.appendChild(empty);
          return;
        }

        list.forEach(function (ticker, i) {
          grid.appendChild(makeCard(ticker, i));
        });
      }

      /* "What @aleabitoreddit prioritizes" — ranked chips from AIE_DATA.priorities
         (computed by the ingest backend). Hidden until there is data. */
      function renderPriorityStrip() {
        var strip = document.getElementById("priorityStrip");
        if (!strip) return;
        var pri = (DATA && DATA.priorities) || [];
        if (!pri.length) {
          strip.hidden = true;
          return;
        }
        strip.innerHTML = "";
        strip.hidden = false;
        // Neutral "what the source raised" — NOT a ranked leaderboard. With thin
        // signal (most names mentioned once) a rank would be misleading, so we
        // show mention counts as tags for you to consider, sorted by emphasis.
        strip.appendChild(el("span", "ps-label", "Mentioned by @aleabitoreddit"));
        pri.slice(0, 10).forEach(function (p) {
          var chip = el("span", "ps-chip");
          chip.appendChild(el("span", "ps-sym", p.ticker));
          chip.appendChild(el("span", "ps-meta", p.mentions + "×"));
          strip.appendChild(chip);
        });
      }

      /* ----------------------------------------------------------
         Watchlist (Tab 2) — sortable table of all tickers with the
         weekly price snapshot (price / 7d% / 1M% / mkt cap) baked into
         data.js by ingest/fetch_prices.py. Price fields are read from
         AIE_DATA (authoritative/fresh); only the user's rating persists
         to localStorage. "Fetch prices" calls the local serve.py.
         ---------------------------------------------------------- */
      var WL_RATINGS = ["watch", "owned", "passed"];
      var wlState = { key: "category", dir: 1, view: "flat", categoryFilter: null };

      function wlTickers() { return (DATA && DATA.tickers) ? DATA.tickers.slice() : []; }

      function wlFilteredTickers() {
        var all = wlTickers();
        if (!wlState.categoryFilter) return all;
        return all.filter(function (t) { return t.category === wlState.categoryFilter; });
      }

      // Categories ordered by their value-chain `layer` field (ascending).
      function categoriesByLayerAsc() {
        return Object.keys(DATA.categories).sort(function (a, b) {
          return (DATA.categories[a].layer || 0) - (DATA.categories[b].layer || 0);
        });
      }

      function ratingFor(sym) {
        var stored = getStoredTickers().filter(function (t) { return t.ticker === sym; })[0];
        if (stored && stored.rating) return stored.rating;
        var d = wlTickers().filter(function (t) { return t.ticker === sym; })[0];
        return (d && d.rating) || "watch";
      }
      function setRating(sym, val) {
        try {
          var list = readJSON(STORAGE_KEYS.tickers) || [];
          var row = list.filter(function (t) { return t.ticker === sym; })[0];
          if (row) { row.rating = val; } else { list.push({ ticker: sym, rating: val }); }
          localStorage.setItem(STORAGE_KEYS.tickers, JSON.stringify(list));
        } catch (e) { /* storage may be unavailable on file:// */ }
      }

      function fmtNum(n, dp) {
        return Number(n).toLocaleString(undefined, { minimumFractionDigits: dp, maximumFractionDigits: dp });
      }
      function fmtMcap(v) {
        if (v == null) return null;
        var abs = Math.abs(v), d = v, unit = "";
        if (abs >= 1e12) { d = v / 1e12; unit = "T"; }
        else if (abs >= 1e9) { d = v / 1e9; unit = "B"; }
        else if (abs >= 1e6) { d = v / 1e6; unit = "M"; }
        return "$" + fmtNum(d, d < 10 ? 1 : 0) + unit;
      }

      function wlCompare(a, b) {
        var k = wlState.key;
        var numeric = (k === "price" || k === "chg7d" || k === "chg1m" || k === "marketCap");
        if (numeric) {
          var anull = a[k] == null, bnull = b[k] == null;
          if (anull !== bnull) return anull ? 1 : -1;   // missing values always last
          if (!anull && a[k] !== b[k]) return (a[k] - b[k]) * wlState.dir;
        } else {
          var as = String(a[k] || "").toLowerCase(), bs = String(b[k] || "").toLowerCase();
          if (as !== bs) return (as < bs ? -1 : 1) * wlState.dir;
        }
        return a.ticker < b.ticker ? -1 : 1;  // stable tiebreak
      }

      function pctCell(v) {
        var td = el("td", "num");
        if (v == null) { td.appendChild(el("span", "wl-muted", "—")); return td; }
        var cls = v > 0 ? "wl-pos" : (v < 0 ? "wl-neg" : "wl-muted");
        td.appendChild(el("span", cls, (v > 0 ? "+" : "") + v.toFixed(1) + "%"));
        return td;
      }

      function makeWatchlistRow(t) {
        var cat = DATA.categories[t.category];
        var tr = document.createElement("tr");
        tr.style.setProperty("--accent", cat ? cat.color : "#94a3b8");

        var cTd = document.createElement("td");
        var wrap = el("span", "wl-cat");
        wrap.appendChild(el("span", "wl-dot"));
        wrap.appendChild(el("span", "wl-cat-label", cat ? cat.label : (t.category || "—")));
        cTd.appendChild(wrap); tr.appendChild(cTd);

        var tTd = document.createElement("td"); tTd.appendChild(el("span", "wl-sym", t.ticker)); tr.appendChild(tTd);
        tr.appendChild(el("td", null, t.company || "—"));

        var pTd = el("td", "num");
        if (t.price != null) {
          pTd.appendChild(el("span", "wl-price", fmtNum(t.price, 2)));
          if (t.currency) pTd.appendChild(el("span", "wl-cur", t.currency));
        } else { pTd.appendChild(el("span", "wl-muted", "—")); }
        tr.appendChild(pTd);

        tr.appendChild(pctCell(t.chg7d));
        tr.appendChild(pctCell(t.chg1m));

        var mTd = el("td", "num");
        var mc = fmtMcap(t.marketCap);
        if (mc) { mTd.textContent = mc; }
        else { mTd.appendChild(el("span", "wl-muted", t.marketCapTier || "—")); }
        tr.appendChild(mTd);

        // Trend (sample) — synthetic sparkline placeholder until real daily
        // price history lands.
        var trendTd = document.createElement("td");
        trendTd.style.color = cat ? cat.color : "#94a3b8";
        trendTd.appendChild(sparkSVG(t.ticker, 60, 22));
        tr.appendChild(trendTd);

        var rTd = document.createElement("td");
        var sel = document.createElement("select"); sel.className = "wl-rating";
        WL_RATINGS.forEach(function (opt) {
          var o = document.createElement("option"); o.value = opt; o.textContent = opt; sel.appendChild(o);
        });
        sel.value = ratingFor(t.ticker);
        sel.addEventListener("change", function () { setRating(t.ticker, sel.value); });
        rTd.appendChild(sel); tr.appendChild(rTd);

        return tr;
      }

      function renderWatchlist() {
        var body = document.getElementById("wlBody");
        if (!body || !DATA) return;
        renderWatchlistFilterChips();

        var filtered = wlFilteredTickers();

        var scope = document.getElementById("wlScope");
        if (scope) {
          scope.innerHTML = "";
          scope.appendChild(el("b", null, String(filtered.length)));
          scope.appendChild(document.createTextNode(filtered.length === 1 ? " ticker" : " tickers"));
        }
        var asOf = filtered.map(function (t) { return t.asOf; }).filter(Boolean).sort().slice(-1)[0];
        var asOfEl = document.getElementById("wlAsOf");
        if (asOfEl) asOfEl.textContent = asOf ? ("Prices as of " + asOf.slice(0, 10)) : "No prices yet";

        body.innerHTML = "";

        if (wlState.view === "grouped") {
          categoriesByLayerAsc().forEach(function (catId) {
            var rows = filtered.filter(function (t) { return t.category === catId; });
            if (!rows.length) return;
            var cat = DATA.categories[catId];
            rows.sort(function (a, b) {
              var am = (a.priority && a.priority.mentions) || 0;
              var bm = (b.priority && b.priority.mentions) || 0;
              if (am !== bm) return bm - am;
              return a.ticker < b.ticker ? -1 : 1;
            });
            var subtotal = document.createElement("tr");
            subtotal.className = "wl-subtotal";
            subtotal.style.background = "color-mix(in srgb, " + cat.color + " 6%, white)";
            var td = document.createElement("td");
            td.colSpan = 9;
            td.appendChild(el("b", null, cat.label));
            td.appendChild(document.createTextNode(" · " + rows.length + (rows.length === 1 ? " ticker" : " tickers")));
            subtotal.appendChild(td);
            body.appendChild(subtotal);
            rows.forEach(function (t) { body.appendChild(makeWatchlistRow(t)); });
          });
        } else {
          filtered.slice().sort(wlCompare).forEach(function (t) { body.appendChild(makeWatchlistRow(t)); });
        }

        // Sort-direction arrow on the active header (flat view only).
        document.querySelectorAll(".wl-table thead th .arrow").forEach(function (a) { a.remove(); });
        if (wlState.view === "flat") {
          var activeTh = document.querySelector('.wl-table thead th[data-key="' + wlState.key + '"]');
          if (activeTh) activeTh.appendChild(el("span", "arrow", wlState.dir > 0 ? "▲" : "▼"));
        }
      }

      function renderWatchlistFilterChips() {
        var wrap = document.getElementById("wlFilters");
        if (!wrap || !DATA) return;
        wrap.innerHTML = "";

        var allChip = el("button", "filter-chip" + (!wlState.categoryFilter ? " is-active" : ""), "All");
        allChip.type = "button";
        allChip.addEventListener("click", function () { wlState.categoryFilter = null; renderWatchlist(); });
        wrap.appendChild(allChip);

        categoriesByLayerAsc().forEach(function (id) {
          var c = DATA.categories[id];
          var chip = el("button", "filter-chip" + (wlState.categoryFilter === id ? " is-active" : ""), c.label);
          chip.type = "button";
          chip.style.setProperty("--chip-accent", c.color);
          chip.addEventListener("click", function () { wlState.categoryFilter = id; renderWatchlist(); });
          wrap.appendChild(chip);
        });
      }

      function initWatchlistSort() {
        document.querySelectorAll(".wl-table thead th[data-key]").forEach(function (th) {
          th.addEventListener("click", function () {
            var k = th.getAttribute("data-key");
            if (wlState.key === k) { wlState.dir = -wlState.dir; }
            else { wlState.key = k; wlState.dir = 1; }
            renderWatchlist();
          });
        });
      }

      function initWatchlistViewToggle() {
        var buttons = Array.prototype.slice.call(document.querySelectorAll("#wlViewToggle .vt-btn"));
        buttons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            wlState.view = btn.getAttribute("data-view");
            buttons.forEach(function (b) { b.setAttribute("aria-selected", b === btn ? "true" : "false"); });
            renderWatchlist();
          });
        });
      }

      function initWatchlistFetch() {
        var btn = document.getElementById("wlFetch");
        var hint = document.getElementById("wlHint");
        if (!btn) return;
        btn.addEventListener("click", function () {
          btn.disabled = true;
          var label = btn.textContent;
          btn.textContent = "Fetching…";
          if (hint) hint.hidden = true;
          fetch("api/fetch-prices", { method: "POST" })
            .then(function (r) { if (!r.ok) throw new Error("status " + r.status); return r.json(); })
            .then(function () { location.reload(); })
            .catch(function () {
              btn.disabled = false;
              btn.textContent = label;
              if (hint) {
                hint.hidden = false;
                hint.innerHTML = "";
                hint.appendChild(document.createTextNode("Live fetch needs the local price server. Run "));
                hint.appendChild(el("code", null, "python3 ingest/serve.py"));
                hint.appendChild(document.createTextNode(" then open "));
                hint.appendChild(el("code", null, "http://localhost:8765/"));
                hint.appendChild(document.createTextNode(" and click Fetch prices again."));
              }
            });
        });
      }

      /* ----------------------------------------------------------
         Thesis tab (Tab 3) — feed of @aleabitoreddit ideas from aie_theses.
         Each card shows: date · conviction badge · source link · full text ·
         ticker chips (category-colored). Most-recent first.
         Empty state when nothing ingested yet.
         ---------------------------------------------------------- */
      function getStoredTheses() {
        return readJSON(STORAGE_KEYS.theses) || [];
      }

      function thesisCatColor(sym) {
        var tk = (DATA && DATA.tickers || []).find(function (t) { return t.ticker === sym; });
        if (!tk) return null;
        var cat = DATA.categories && DATA.categories[tk.category];
        return cat ? cat.color : null;
      }

      var thState = { categoryFilter: null, highConvictionOnly: false };

      // ticker symbol -> category id, for resolving a thesis's tickers to categories.
      function tickerCategoryMap() {
        var map = {};
        ((DATA && DATA.tickers) || []).forEach(function (t) { map[t.ticker] = t.category; });
        return map;
      }

      function thesisMatchesCategory(th, catId, catMap) {
        if (!catId) return true;
        return (th.tickers || []).some(function (sym) { return catMap[sym] === catId; });
      }

      function renderThesisFilterChips() {
        var wrap = document.getElementById("thFilters");
        if (!wrap || !DATA) return;
        wrap.innerHTML = "";

        var allChip = el("button", "filter-chip" + (!thState.categoryFilter ? " is-active" : ""), "All");
        allChip.type = "button";
        allChip.addEventListener("click", function () { thState.categoryFilter = null; renderTheses(); });
        wrap.appendChild(allChip);

        Object.keys(DATA.categories).sort(function (a, b) {
          return (DATA.categories[a].layer || 0) - (DATA.categories[b].layer || 0);
        }).forEach(function (id) {
          var c = DATA.categories[id];
          var chip = el("button", "filter-chip" + (thState.categoryFilter === id ? " is-active" : ""), c.label);
          chip.type = "button";
          chip.style.setProperty("--chip-accent", c.color);
          chip.addEventListener("click", function () { thState.categoryFilter = id; renderTheses(); });
          wrap.appendChild(chip);
        });

        var hc = el("button", "filter-chip" + (thState.highConvictionOnly ? " is-active" : ""), "High conviction only");
        hc.type = "button";
        hc.style.setProperty("--chip-accent", "#16a34a");
        hc.addEventListener("click", function () {
          thState.highConvictionOnly = !thState.highConvictionOnly;
          renderTheses();
        });
        wrap.appendChild(hc);
      }

      function renderTheses() {
        var feed = document.getElementById("thFeed");
        var scope = document.getElementById("thScope");
        var count = document.getElementById("thCount");
        if (!feed) return;

        renderThesisFilterChips();

        var allTheses = getStoredTheses();
        var catMap = tickerCategoryMap();
        var theses = allTheses.filter(function (th) {
          if (thState.highConvictionOnly && th.conviction !== "high") return false;
          return thesisMatchesCategory(th, thState.categoryFilter, catMap);
        }).sort(function (a, b) {
          var da = a.postedAt || a.ingestedAt || "";
          var db = b.postedAt || b.ingestedAt || "";
          return db < da ? -1 : db > da ? 1 : 0;  // most recent first
        });

        if (scope) {
          scope.innerHTML = "";
          scope.appendChild(el("b", null, String(theses.length)));
          scope.appendChild(document.createTextNode(
            theses.length === 1 ? " idea captured" : " ideas captured"
          ));
        }
        if (count) count.textContent = theses.length
          ? ("from @aleabitoreddit")
          : "";

        feed.innerHTML = "";

        if (!theses.length) {
          var empty = document.createElement("div");
          empty.className = "th-empty";
          if (!allTheses.length) {
            var t = document.createElement("p"); t.className = "th-empty-title";
            t.textContent = "No theses ingested yet";
            var s = document.createElement("p"); s.className = "th-empty-sub";
            s.innerHTML = "Forward a post from @aleabitoreddit to your Telegram bot, or run<br>"
              + "<code>python3 ingest/bot.py --text \"$AAOI is my top pick\"</code><br>"
              + "to test the pipeline. Ideas will appear here automatically.";
            empty.appendChild(t); empty.appendChild(s);
          } else {
            empty.appendChild(el("p", "th-empty-title", "No theses match these filters"));
            empty.appendChild(el("p", "th-empty-sub", "Try clearing the category filter or the high-conviction toggle."));
          }
          feed.appendChild(empty);
          return;
        }

        // Group by posting day, inserting a zone-divider-style label before each new day.
        var frag = document.createDocumentFragment();
        var lastDay = null;
        theses.forEach(function (th) {
          var day = (th.postedAt || th.ingestedAt || "").slice(0, 10);
          if (day && day !== lastDay) {
            frag.appendChild(makeZoneDivider(day, true));
            lastDay = day;
          }
          frag.appendChild(makeThesisCard(th));
        });
        feed.appendChild(frag);
      }

      // Build one thesis card. Shared by the Thesis feed and the Brain tab's
      // drill-down (compact clips the body to a snippet). textContent only.
      function makeThesisCard(th, opts) {
        opts = opts || {};
        var card = document.createElement("div");
        card.className = "th-card" + (th.conviction === "high" ? " high-conviction" : "")
          + (opts.compact ? " th-card-compact" : "");

        var meta = document.createElement("div"); meta.className = "th-card-meta";
        var dateStr = th.postedAt || th.ingestedAt || "";
        if (dateStr) meta.appendChild(el("span", "th-date", dateStr.slice(0, 10)));
        meta.appendChild(el("span", "th-conviction " + (th.conviction === "high" ? "high" : "normal"),
          th.conviction === "high" ? "High conviction" : "Note"));
        if (th.sourceUrl) {
          var link = document.createElement("a");
          link.className = "th-source"; link.href = th.sourceUrl;
          link.target = "_blank"; link.rel = "noopener noreferrer";
          link.textContent = "View post ↗";
          meta.appendChild(link);
        }
        card.appendChild(meta);

        var body = th.text || "";
        if (opts.compact && body.length > 280) body = body.slice(0, 280).trim() + "…";
        card.appendChild(el("p", "th-text", body));

        var tickers = th.tickers || [];
        if (tickers.length) {
          var chips = document.createElement("div"); chips.className = "th-tickers";
          tickers.forEach(function (sym) {
            var chip = el("span", "th-ticker", sym);
            var color = thesisCatColor(sym);
            if (color) chip.style.setProperty("--t-color", color);
            chips.appendChild(chip);
          });
          card.appendChild(chips);
        }
        return card;
      }

      /* ----------------------------------------------------------
         Brain tab (Tab 4) — synthesized theme digests from
         AIE_DATA.brain (produced by ingest/synthesize.py). One card
         per supply-chain category: narrative · conviction · key
         points · ticker chips · drill-down to raw source theses.
         Read straight from AIE_DATA (backend-owned), like priorities.
         ---------------------------------------------------------- */
      function renderBrain() {
        var feed = document.getElementById("brainFeed");
        var scope = document.getElementById("brainScope");
        var metaEl = document.getElementById("brainMeta");
        if (!feed || !DATA) return;

        var brain = DATA.brain || {};
        var digests = (brain.digests || []).filter(function (d) { return d.thesesCount > 0; });

        if (scope) {
          scope.innerHTML = "";
          scope.appendChild(el("b", null, String(digests.length)));
          scope.appendChild(document.createTextNode(
            digests.length === 1 ? " theme synthesized" : " themes synthesized"
          ));
        }
        if (metaEl) {
          metaEl.textContent = (brain.meta && brain.meta.generatedAt)
            ? ("synthesized " + brain.meta.generatedAt.slice(0, 10)
               + (brain.meta.model ? " · " + brain.meta.model : ""))
            : "";
        }

        feed.innerHTML = "";

        if (!digests.length) {
          var empty = document.createElement("div");
          empty.className = "th-empty";
          empty.appendChild(el("p", "th-empty-title", "No brain digests yet"));
          var s = el("p", "th-empty-sub");
          s.appendChild(document.createTextNode("Run "));
          s.appendChild(el("code", null, "python3 ingest/synthesize.py"));
          s.appendChild(document.createTextNode(
            " to synthesize per-theme digests from the ideas you've captured."));
          empty.appendChild(s);
          feed.appendChild(empty);
          return;
        }

        // Index theses by id for the drill-down (backend-owned theses preferred).
        var byId = {};
        ((DATA.theses) || getStoredTheses() || []).forEach(function (t) { byId[t.id] = t; });

        var frag = document.createDocumentFragment();
        digests.forEach(function (d) {
          var cat = (DATA.categories && DATA.categories[d.category]) || null;
          var card = el("article", "bd-card");
          card.style.setProperty("--accent", cat ? cat.color : "#94a3b8");

          var head = el("div", "bd-head");
          head.appendChild(el("span", "bd-title", cat ? cat.label : d.category));
          if (cat && cat.subtitle) head.appendChild(el("span", "bd-sub", cat.subtitle));
          var cvl = (d.conviction === "high" || d.conviction === "medium" || d.conviction === "low")
            ? d.conviction : "medium";
          head.appendChild(el("span", "bd-conviction " + cvl, cvl + " conviction"));
          card.appendChild(head);

          var counts = d.dailyMentions && d.dailyMentions.counts;
          if (counts && counts.length) {
            var trend = el("div", "bd-trend");
            trend.style.color = cat ? cat.color : "#94a3b8";
            var ns = "http://www.w3.org/2000/svg";
            var svg = document.createElementNS(ns, "svg");
            svg.setAttribute("viewBox", "0 0 90 26");
            svg.setAttribute("width", "90"); svg.setAttribute("height", "26");
            svg.setAttribute("aria-hidden", "true");
            svg.classList.add("spark-svg");
            var path = document.createElementNS(ns, "path");
            path.setAttribute("d", countsToSparkPath(counts, 90, 26));
            path.setAttribute("class", "spark-path");
            svg.appendChild(path);
            trend.appendChild(el("span", "bd-trend-label", "Mentions"));
            trend.appendChild(svg);
            trend.appendChild(el("span", "bd-trend-arrow", trendArrow(counts)));
            card.appendChild(trend);
          }

          if (d.narrative) card.appendChild(el("p", "bd-narrative", d.narrative));

          var pts = d.keyPoints || [];
          if (pts.length) {
            var ul = el("ul", "bd-points");
            pts.forEach(function (pt) { ul.appendChild(el("li", null, pt)); });
            card.appendChild(ul);
          }

          var tks = d.tickers || [];
          if (tks.length) {
            var chips = el("div", "bd-tickers");
            tks.forEach(function (sym) {
              var chip = el("span", "th-ticker", sym);
              var color = thesisCatColor(sym);
              if (color) chip.style.setProperty("--t-color", color);
              chips.appendChild(chip);
            });
            card.appendChild(chips);
          }

          // Drill-down: lazily reveal the raw source theses behind this digest.
          var ids = d.sourceThesisIds || [];
          if (ids.length) {
            var sources = el("div", "bd-sources");
            var built = false;
            var n = ids.length;
            var label = function (open) {
              return (open ? "Hide " : "Show ") + n + (n === 1 ? " source thesis" : " source theses");
            };
            var toggle = el("button", "bd-toggle", label(false));
            toggle.setAttribute("type", "button");
            toggle.setAttribute("aria-expanded", "false");
            toggle.addEventListener("click", function () {
              var open = sources.classList.toggle("open");
              toggle.setAttribute("aria-expanded", open ? "true" : "false");
              toggle.textContent = label(open);
              if (open && !built) {
                ids.forEach(function (tid) {
                  var th = byId[tid];
                  if (th) sources.appendChild(makeThesisCard(th, { compact: true }));
                });
                built = true;
              }
            });
            card.appendChild(toggle);
            card.appendChild(sources);
          }

          frag.appendChild(card);
        });
        feed.appendChild(frag);
      }

      // Boot
      seedLocalStorage();
      paintGradientBorder();
      initTabs();
      initMapViewToggle();
      renderMap();
      renderCards(null);
      renderPriorityStrip();
      renderWatchlist();
      initWatchlistSort();
      initWatchlistViewToggle();
      initWatchlistFetch();
      renderTheses();
      renderBrain();
    })();
  </script>
</body>
</html>
