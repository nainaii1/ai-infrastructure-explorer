<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coverage — AI Infrastructure Explorer</title>

  <!-- ⚡ favicon: inline SVG data URI (no external request, works on file://) -->
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M13 2 4.5 13.5H11l-1 8.5L19.5 10H13z' fill='%233b82f6'/%3E%3C/svg%3E"
  />

  <!-- Shared editorial design tokens + components (masthead, chips, ledger, colophon). -->
  <link rel="stylesheet" href="shared/theme.css" />

  <style>
    /* Front-page-only layout. Tokens + components come from theme.css —
       nothing here redefines a token or an .aie-* component. */
    .front { padding: 0 0 8px; }
    .front-eyebrow { margin: 0 0 10px; }
    .front-header { margin: 0 0 8px; }
    .front-headline {
      margin: 0 0 12px;
      font-family: var(--display);
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--ink);
    }
    /* Standfirst — serif body, 17px / 1.65 (theme.css body default; restated
       here so the measure/colour read as an editorial standfirst). */
    .standfirst {
      margin: 0;
      font-family: var(--display);
      font-size: 17px;
      line-height: 1.65;
      color: var(--text);
    }
    .standfirst b { font-weight: 600; color: var(--ink); }
    .standfirst a { color: var(--brand-ink, var(--ink)); }

    /* Coverage ledger — reserved shell (P8 fills it with real rows). */
    .ledger-section { margin: 44px 0 0; }
    .ledger-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--ink);
    }
    .ledger-count { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .empty-state {
      padding: 40px 24px;
      text-align: center;
      border: 1px dashed var(--border);
      border-top: 0;
      border-radius: 0 0 var(--r-card) var(--r-card);
      background: var(--card);
    }
    .empty-state p {
      margin: 0;
      font-family: var(--display);
      font-size: 17px;
      line-height: 1.6;
      color: var(--muted);
    }

    /* Filter chips (kind + rating). Uses the shared .aie-chip toggle. */
    .ledger-filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 16px 0 10px;
    }
    .ledger-filters .lf-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 2px;
    }
    .ledger-filters .lf-group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .ledger-filters button { cursor: pointer; font: inherit; text-transform: capitalize; }
    .ledger-filters .lf-sep { width: 1px; height: 15px; background: var(--border); margin: 0 6px; }

    /* Ticker + kind cells in the ledger table. */
    .ledger-section .aie-ledger .l-ticker { white-space: nowrap; }
    .ledger-section .aie-ledger .aie-ledger-title a {
      color: inherit; text-decoration: none;
    }
    .ledger-section .aie-ledger tbody tr.is-link:hover .aie-ledger-title a { color: var(--ink); }

    /* Sub-label above the "verdict only" stub rows when there are no memos yet. */
    .ledger-stub-note {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--muted);
      margin: 22px 0 6px;
    }
    .ledger-nomatch {
      padding: 24px;
      font-family: var(--sans);
      font-size: 13.5px;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .front-headline { margin-bottom: 16px; }
    }
  </style>
</head>
<body>
  <div class="gradient-border" id="gradientBorder"></div>

  <!-- Shared top nav (theme.css). Rendered by AIE.renderNav('coverage') at boot. -->
  <div id="topNav"></div>

  <main class="aie-wrap front">
    <!-- Page header — this page is the memo index, nothing more. The Desk
         (desk.html) is the front door; this is the reading room. -->
    <header class="front-header">
      <p class="aie-label front-eyebrow">Personal coverage desk / 2026</p>
      <h1 class="front-headline">Coverage</h1>
      <p class="standfirst">Published memos and desk verdicts, newest first.
        The working desk lives at <a href="desk.html">the Desk</a>.</p>
    </header>

    <!-- Coverage ledger — memo rows + "verdict only" stubs, built at boot. -->
    <section class="ledger-section" aria-label="Coverage and market notes">
      <div class="ledger-head">
        <span class="aie-label">Memos &amp; market notes</span>
        <span class="ledger-count" id="ledgerCount">No entries yet</span>
      </div>
      <div class="ledger-filters" id="ledgerFilters"></div>
      <div id="ledgerBody"></div>
    </section>
  </main>

  <footer class="aie-colophon" id="colophon"><!-- disclaimer from desk.meta at boot --></footer>

  <!-- data.js MUST load first: defines window.AIE_DATA -->
  <script src="data.js"></script>
  <!-- Shared AIE namespace (seeding, nav, formatters). After data.js. -->
  <script src="shared/common.js"></script>

  <script>
    (function () {
      "use strict";
      var DATA = window.AIE_DATA || {};
      var AIE = window.AIE;

      // Shared boot: seed localStorage, paint the category gradient, render nav.
      AIE.seed();
      AIE.paintGradientBorder();
      AIE.renderNav("coverage");

      function el(tag, className, text) {
        var n = document.createElement(tag);
        if (className) n.className = className;
        if (text != null) n.textContent = text;
        return n;
      }
      var tickers = DATA.tickers || [];
      var desk = DATA.desk || {};
      var dmeta = desk.meta || {};

      // ---- Colophon: disclaimer straight from desk.meta (fallback if absent). ----
      var colo = document.getElementById("colophon");
      if (colo) {
        colo.appendChild(el("strong", null, "AI Infrastructure Explorer"));
        colo.appendChild(document.createTextNode(" — "));
        colo.appendChild(document.createTextNode(
          dmeta.disclaimer ||
          "Personal research tool — not investment advice."));
        colo.appendChild(document.createTextNode(" · "));
        var designLink = el("a", null, "Design reference");
        designLink.href = "design.html";
        colo.appendChild(designLink);
      }

      /* ================================================================
         Coverage ledger. One row per published memo (newest first) plus
         muted "verdict only" stubs for Core names the desk has a stance
         on but hasn't written up yet. Filters (kind + rating) act on the
         memo rows; the reserved empty-state stays when there are no memos.
         ================================================================ */
      var tickerCategory = {};
      tickers.forEach(function (t) { tickerCategory[t.ticker] = t.category; });
      function catColor(sym) { return AIE.categoryColor(tickerCategory[sym], null); }

      var KIND_LABEL = { coverage: "Coverage", update: "Update", "exit-note": "Exit note" };
      function kindLabel(k) { return KIND_LABEL[k] || k || "Note"; }

      var ledgerFilter = { kind: null, rating: null, theme: null };

      function publishedDesc(a, b) {
        var da = a.publishedAt || a.updatedAt || "";
        var db = b.publishedAt || b.updatedAt || "";
        return db < da ? -1 : (db > da ? 1 : 0);
      }

      // A ledger row. `stub` rows are muted "verdict only" links to the watchlist.
      function ledgerRow(o) {
        var tr = el("tr", o.stub ? "is-stub" : "is-link");

        tr.appendChild(el("td", "aie-ledger-date", o.date || "—"));

        var tCell = el("td", "l-ticker");
        var chip = el("span", "aie-chip aie-chip--ticker", o.ticker);
        var color = catColor(o.ticker);
        if (color) chip.style.setProperty("--chip-accent", color);
        tCell.appendChild(chip);
        tr.appendChild(tCell);

        var kCell = el("td");
        if (o.kind) kCell.appendChild(el("span", "aie-chip", kindLabel(o.kind)));
        else kCell.appendChild(document.createTextNode("—"));
        tr.appendChild(kCell);

        var titleCell = el("td", "aie-ledger-title");
        var a = el("a", null, o.title);
        a.href = o.href;
        titleCell.appendChild(a);
        tr.appendChild(titleCell);

        var rCell = el("td");
        if (o.rating) rCell.appendChild(el("span", "aie-badge aie-stance--" + o.rating, AIE.stanceLabel(o.rating)));
        else rCell.appendChild(document.createTextNode("—"));
        tr.appendChild(rCell);

        // Whole-row click convenience (the title is the real, keyboard-accessible link).
        tr.addEventListener("click", function (ev) {
          if (ev.target.tagName !== "A") window.location.href = o.href;
        });
        return tr;
      }

      function buildLedgerTable(memoRows, stubRows) {
        var table = el("table", "aie-ledger");
        var thead = el("thead");
        var htr = el("tr");
        ["Date", "Ticker", "Kind", "Title", "Rating"].forEach(function (h) {
          htr.appendChild(el("th", null, h));
        });
        thead.appendChild(htr);
        table.appendChild(thead);

        var tbody = el("tbody");
        memoRows.forEach(function (m) {
          tbody.appendChild(ledgerRow({
            date: m.publishedAt ? AIE.fmtDate(m.publishedAt) : "—",
            ticker: m.ticker,
            kind: m.kind,
            title: m.title || m.id,
            rating: m.rating,
            href: "memo.html?id=" + encodeURIComponent(m.id),
            stub: false
          }));
        });
        stubRows.forEach(function (v) {
          tbody.appendChild(ledgerRow({
            date: "—",
            ticker: v.ticker,
            kind: null,
            title: "Verdict only — memo pending",
            rating: v.stance,
            href: "desk.html#chapter-watchlist",
            stub: true
          }));
        });
        table.appendChild(tbody);
        return table;
      }

      // Distinct values in author-preferred order, filtered to those present.
      function distinctIn(items, key, order) {
        var seen = {};
        items.forEach(function (it) { if (it[key]) seen[it[key]] = true; });
        return order.filter(function (v) { return seen[v]; });
      }

      function renderFilterGroup(label, dimension, values, labelFn) {
        var group = el("div", "lf-group");
        group.appendChild(el("span", "lf-label", label));
        function chip(text, value) {
          var active = ledgerFilter[dimension] === value;
          var b = el("button", "aie-chip" + (active ? " is-active" : ""), text);
          b.type = "button";
          b.addEventListener("click", function () {
            ledgerFilter[dimension] = value;
            renderLedger();
          });
          return b;
        }
        group.appendChild(chip("All", null));
        values.forEach(function (v) {
          var text = labelFn ? labelFn(v) : (v === "exit-note" ? "Exit note" : v);
          group.appendChild(chip(text, v));
        });
        return group;
      }

      // Distinct ticker categories present across the given memos, ordered by the
      // categories' value-chain layer so the theme chips read Supply → Demand.
      function themesInMemos(memos) {
        var seen = {};
        memos.forEach(function (m) { var c = tickerCategory[m.ticker]; if (c) seen[c] = true; });
        return Object.keys(DATA.categories)
          .filter(function (id) { return seen[id]; })
          .sort(function (a, b) {
            return (DATA.categories[a].layer || 0) - (DATA.categories[b].layer || 0);
          });
      }
      function themeLabel(id) {
        var c = DATA.categories && DATA.categories[id];
        return (c && c.label) || id;
      }

      function renderLedger() {
        var store = DATA.memos || {};
        var memos = (store.memos || []).slice().sort(publishedDesc);
        var verdicts = (DATA.desk && DATA.desk.verdicts) || [];

        var countEl = document.getElementById("ledgerCount");
        var filtersEl = document.getElementById("ledgerFilters");
        var bodyEl = document.getElementById("ledgerBody");
        if (!bodyEl) return;

        countEl.textContent = memos.length
          ? memos.length + (memos.length === 1 ? " entry" : " entries")
          : "No entries yet";

        // Filters — only meaningful when memos exist.
        filtersEl.innerHTML = "";
        if (memos.length) {
          var kinds = distinctIn(memos, "kind", ["coverage", "update", "exit-note"]);
          var ratings = distinctIn(memos, "rating", ["act", "accumulate", "watch", "pass"]);
          var themes = themesInMemos(memos);
          var groups = [];
          if (kinds.length > 1) groups.push(renderFilterGroup("Kind", "kind", kinds));
          if (ratings.length > 1) groups.push(renderFilterGroup("Rating", "rating", ratings, AIE.stanceLabel));
          if (themes.length > 1) groups.push(renderFilterGroup("Theme", "theme", themes, themeLabel));
          groups.forEach(function (g, i) {
            if (i) filtersEl.appendChild(el("span", "lf-sep"));
            filtersEl.appendChild(g);
          });
        }

        var filteredMemos = memos.filter(function (m) {
          return (!ledgerFilter.kind || m.kind === ledgerFilter.kind)
              && (!ledgerFilter.rating || m.rating === ledgerFilter.rating)
              && (!ledgerFilter.theme || tickerCategory[m.ticker] === ledgerFilter.theme);
        });

        // "Verdict only" stubs: Core names with a desk verdict but no memo.
        // The theme filter is a ticker attribute, so it narrows stubs too; kind/
        // rating are memo attributes and leave stubs untouched (as before).
        var memoTickers = {};
        memos.forEach(function (m) { memoTickers[m.ticker] = true; });
        var stubs = verdicts.filter(function (v) {
          return !memoTickers[v.ticker]
              && (!ledgerFilter.theme || tickerCategory[v.ticker] === ledgerFilter.theme);
        });

        bodyEl.innerHTML = "";

        // Empty-state stays when there are no memos at all.
        if (!memos.length) {
          var empty = el("div", "empty-state");
          empty.appendChild(el("p", null, "Coverage notes begin with the next weekly review."));
          bodyEl.appendChild(empty);
          if (stubs.length) {
            bodyEl.appendChild(el("p", "ledger-stub-note",
              stubs.length + " name" + (stubs.length === 1 ? "" : "s") +
              " carry a desk verdict, awaiting a written memo:"));
            bodyEl.appendChild(buildLedgerTable([], stubs));
          }
          return;
        }

        if (!filteredMemos.length && !stubs.length) {
          bodyEl.appendChild(el("div", "ledger-nomatch", "No memos match these filters."));
          return;
        }
        bodyEl.appendChild(buildLedgerTable(filteredMemos, stubs));
      }

      renderLedger();
    })();
  </script>
</body>
</html>
